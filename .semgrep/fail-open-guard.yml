rules:
  # B-03: Flag every `failOpen: true` usage so each one is a deliberate,
  # audited decision. Passing failOpen: true to withAuth/withAuthAnyRole
  # weakens tenant isolation by allowing requests to proceed when
  # setTenantContext fails.
  #
  # NOTE: a `pattern-not-inside` that matched a `// FAIL_OPEN_REASON:` comment
  # was removed — Semgrep matches against the AST and ignores comments, so that
  # exception never worked (it silently suppressed nothing / everything). The
  # idiomatic, working mechanism is an inline suppression: keep a documented
  # `// FAIL_OPEN_REASON: <why>` line for humans AND a
  # `// nosemgrep: semgrep.fail-open-guard` on the same line as the reviewed,
  # intentional usage.
  - id: fail-open-guard
    pattern: "failOpen: true"
    message: >
      `failOpen: true` detected. Passing failOpen weakens tenant isolation —
      it lets a request continue even when the tenant session variable that RLS
      depends on could not be set. Use it ONLY for explicit, read-only routes
      that never touch tenant data. Document the reason with a
      `// FAIL_OPEN_REASON: <explanation>` comment and, once reviewed, suppress
      this finding with `// nosemgrep: semgrep.fail-open-guard`.
    severity: WARNING
    languages: [typescript, javascript]
    paths:
      include:
        - "src/"
      exclude:
        - "src/lib/__tests__/**"
        - "src/lib/with-auth.ts"
    metadata:
      category: security
      technology:
        - supabase
      references:
        - https://github.com/groupsmix/webs-alots/blob/main/AGENTS.md
