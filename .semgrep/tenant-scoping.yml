rules:
  # R-10: Flag supabase .from() queries that do not chain .eq("clinic_id", ...)
  #
  # Every tenant-scoped database query MUST include .eq("clinic_id", clinicId)
  # to enforce application-level tenant isolation (AGENTS.md rule #1). RLS is
  # defense-in-depth — application-level scoping is required even with RLS.
  #
  # This rule rewrites the previous version so that .eq("clinic_id", ...) is
  # recognised anywhere in the method chain. The previous version combined
  # `pattern-inside: $EXPR` with a `pattern-not-regex`, but the regex only
  # ever evaluated against the `from().method()` sub-range, and the auxiliary
  # `pattern-not` clauses only suppressed chains where .eq("clinic_id") was
  # the terminal call (within at most two trailing calls). Both silently
  # failed for real-world chains, producing false positives on queries that
  # are correctly scoped, e.g.:
  #
  #   .from("t").select(...).eq("clinic_id", id).order(...).limit(n)
  #   .from("t").update(data).eq("id", x).eq("clinic_id", id)
  #
  # The fix: `pattern-not-inside` with method-chain ellipsis. It is
  # containment-based — any from().crud() match that sits inside a chain
  # which eventually calls .eq("clinic_id", ...) is excluded, regardless of
  # chain depth or calls following the .eq().
  #
  # False positives this rule deliberately allows:
  #   - Queries on the whitelisted service tables below
  #   - Queries in cron jobs that intentionally iterate over all clinics
  #     (callers should still annotate these with `// nosemgrep: tenant-scoping`
  #     for documentation purposes — the rule cannot detect cron context)
  #   - Admin client queries (createAdminClient) used for cross-tenant ops
  #   - Auth/registration flows before a clinic_id exists
  #
  - id: tenant-scoping
    patterns:
      - pattern: |
          $CLIENT.from($TABLE).$METHOD(...)
      # CRUD methods only — ignore .from(...).rpc(...), etc.
      - metavariable-regex:
          metavariable: $METHOD
          regex: ^(select|insert|update|delete|upsert)$
      # Service-level / non-clinic-keyed tables.
      - metavariable-regex:
          metavariable: $TABLE
          # Negative lookahead: match any quoted table name that is NOT one
          # of the genuinely non-clinic-keyed tables.
          #
          # Schema audit (supabase/migrations/) shows these tables have NO
          # clinic_id column, so the rule exempts them directly (other
          # non-clinic-keyed tables are handled via inline `nosemgrep`):
          #   - `clinics`            — the tenant table itself; querying it
          #                             directly is the service-level pattern.
          #   - `ai_provider_configs`— global provider config; no clinic_id.
          #   - `ai_task_configs`    — global per-task model routing pins; no clinic_id.
          #   - `announcements`      — platform-wide super-admin broadcasts; the
          #                             table has NO clinic_id column (see
          #                             00005_schema_gaps.sql). Targeting is done
          #                             via the `target`/`target_label` columns,
          #                             not tenant ownership.
          #   - `demo_leads`         — public landing-page demo requests
          #                             (migration 00191). The submitter is not
          #                             yet a tenant, so the table has NO
          #                             clinic_id column; RLS restricts reads to
          #                             super_admin. Cross-tenant by design.
          #   - `document_templates` — platform-wide document templates managed
          #                             by super_admin (migration 00193). Global
          #                             table with NO clinic_id column; RLS gives
          #                             super_admin full access and authenticated
          #                             users read-only on active rows.
          #
          # All other queue / processed-events tables (notification_queue,
          # processed_stripe_events, processed_whatsapp_messages,
          # webhook_retry_queue, support_tickets) DO have `clinic_id NOT
          # NULL` and should keep firing — defense-in-depth requires the
          # filter even when the row is uniquely identified by another
          # primary key. Use `// nosemgrep: tenant-scoping` annotations
          # (above the from() call) for documented exceptions.
          #
          # The `users` table also has clinic_id NOT NULL; user-keyed
          # self-service updates (.eq("id", profile.id)) should be
          # annotated rather than whitelisted, so a future bare
          # .from("users").select("*") still triggers a warning.
          regex: |-
            ^(?!["'](clinics|ai_provider_configs|ai_task_configs|announcements|demo_leads|document_templates)["']).*$
      # Any .eq("clinic_id", ...) anywhere in the surrounding method chain
      # makes this query tenant-scoped. Semgrep normalises JS string quotes,
      # but both variants are kept for belt-and-suspenders parity with the
      # codebase's mixed quoting.
      - pattern-not-inside: |
          $CLIENT.from($TABLE).$METHOD(...). ... .eq("clinic_id", ...)
      - pattern-not-inside: |
          $CLIENT.from($TABLE).$METHOD(...). ... .eq('clinic_id', ...)
      # insert/upsert with clinic_id in the data object.
      - pattern-not-inside: |
          $CLIENT.from($TABLE).insert({clinic_id: ..., ...})
      - pattern-not-inside: |
          $CLIENT.from($TABLE).upsert({clinic_id: ..., ...})
      - pattern-not-inside: |
          $CLIENT.from($TABLE).insert([..., {clinic_id: ..., ...}, ...])
    message: >
      Supabase query on `$TABLE` missing `.eq("clinic_id", ...)` — every
      tenant-scoped query must filter by clinic_id for application-level
      isolation (see AGENTS.md). If this table is intentionally not
      clinic-keyed, add it to the whitelist in `.semgrep/tenant-scoping.yml`.
    severity: WARNING
    languages: [typescript, javascript]
    paths:
      exclude:
        - "src/lib/__tests__/integration/rls-*.test.ts"
        - "src/lib/__tests__/integration/rls-*.test.tsx"
        - "src/app/api/admin/readiness/**"
    metadata:
      category: security
      technology:
        - supabase
      references:
        - https://github.com/groupsmix/webs-alots/blob/main/AGENTS.md
