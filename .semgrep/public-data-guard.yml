rules:
  # R-16: Ban service-role Supabase clients in public data files (sitemap,
  # robots). These files are publicly crawlable and must only use anon/public
  # clients (createPublicAnonClient) to prevent leaking private, RLS-protected
  # data. All service-role factories are banned here, not just createAdminClient.
  - id: public-data-no-admin-client
    pattern-either:
      - pattern: createAdminClient(...)
      - pattern: createUntypedAdminClient(...)
      - pattern: createScopedAdminClient(...)
      - pattern: createServiceClient(...)
    message: >
      Service-role Supabase client (createAdminClient / createUntypedAdminClient /
      createScopedAdminClient / createServiceClient) is banned in sitemap/robots
      files. Use createPublicAnonClient() instead to prevent leaking private data
      into publicly-crawlable endpoints.
    severity: ERROR
    languages: [typescript, javascript]
    paths:
      include:
        - "src/app/sitemap*"
        - "src/app/robots*"
    metadata:
      category: security
      technology:
        - supabase
      references:
        - https://github.com/groupsmix/webs-alots/blob/main/AGENTS.md
