rules:
  # R-16: Ban createAdminClient in public data files (sitemap, robots).
  # These files should only use anon/public clients to prevent leaking
  # private data into publicly-crawlable endpoints.
  - id: public-data-no-admin-client
    patterns:
      - pattern: createAdminClient(...)
    message: >
      createAdminClient() is banned in sitemap/robots files. Use
      createPublicAnonClient() instead to prevent leaking private data
      into publicly-crawlable endpoints.
    severity: ERROR
    languages: [typescript, javascript]
    paths:
      include:
        - "src/app/sitemap*"
        - "src/app/robots*"
    metadata:
      category: security
      technology:
        - supabase
      references:
        - https://github.com/groupsmix/webs-alots/blob/main/AGENTS.md
