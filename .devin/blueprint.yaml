# https://docs.devin.ai/onboard-devin/environment-yaml
# Commands run from the repo root.

initialize:
  - uses: github.com/actions/setup-node@v4
    with:
      node-version-file: ".nvmrc"
      cache: npm

maintenance: |
  npm install
  npm run prepare

knowledge:
  - name: lint
    contents: |
      npm run lint
  - name: test
    contents: |
      npm run test
  - name: typecheck
    contents: |
      npm run typecheck
  - name: build
    contents: |
      npm run build:cf
  - name: deploy
    contents: |
      npm run deploy
