# F-A31-21: Supabase project configuration
# This file ensures JWT TTL, MFA, and auth settings are version-controlled
# rather than dashboard-only.
#
# Reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "oltigo-health"

[auth]
# JWT expiry — 1 hour (3600s). Short-lived to limit token theft window.
jwt_expiry = 3600

# Allow new signups
enable_signup = true

# Password requirements
# A54-2: Raised from 8 to 12 for healthcare/admin accounts (NIST 800-63B).
minimum_password_length = 12

# MFA — enable TOTP for doctors and admins
[auth.mfa]
# Maximum number of enrolled MFA factors per user
max_enrolled_factors = 5

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

# Rate limiting for auth endpoints
[auth.rate_limit]
# Max email sends per hour
email_sent = 30
# Max SMS sends per hour
sms_sent = 10

# Email settings
[auth.email]
# Require email confirmation before signing in
enable_confirmations = true

# A54-1: Session timeout for PHI app (OWASP ASVS V3).
# Absolute session lifetime: 24 hours; inactivity timeout: 30 minutes.
# NOTE: This block is active when the project is on Supabase Pro plan.
# Local/free-tier preview branches can ignore the PGDG error — the settings
# are simply not enforced in those environments.
[auth.sessions]
timebox = "24h"
inactivity_timeout = "30m"

[db]
# The database major version to use
major_version = 17

[db.pooler]
enabled = true
# Connection pool mode
pool_mode = "transaction"
default_pool_size = 15

# Edge Functions — declared here so `supabase functions deploy` picks them up
# and the bundler resolves their entry points. JWT verification is enforced
# inside each function (see auth header check) rather than relying on
# `verify_jwt` so that we can additionally accept CRON_SECRET tokens.
[functions.notify-booking]
verify_jwt = false

[functions.send-appointment-reminders]
verify_jwt = false

# parse-medical-document is triggered by a DB webhook that sends the
# service-role key as a Bearer token (a valid project JWT). We keep platform
# JWT verification ON (verify_jwt = true) as an extra layer; the function
# additionally performs a constant-time service-role key check internally.
[functions.parse-medical-document]
verify_jwt = true

[storage]
# Max file upload size: 50MB
file_size_limit = "50MiB"
