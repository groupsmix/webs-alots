# Docker Compose for local Oltigo development — SUPPLEMENTARY SERVICES ONLY
# Usage: docker compose up -d
#
# IMPORTANT: This file does NOT run Supabase. The Oltigo app needs the full
# Supabase stack (Postgres + Auth/GoTrue + Storage + PostgREST + the Kong API
# gateway on :54321 + Studio), which this compose file does not provide. Run
# that stack with the Supabase CLI in a separate terminal:
#
#   supabase start      # serves the API gateway on http://localhost:54321
#                       # and Studio on http://localhost:54323
#   supabase status     # prints the anon + service_role keys to copy below
#
# This compose file only adds the extra local services the CLI does NOT ship:
#   - MinIO      — S3-compatible object store (local stand-in for Cloudflare R2)
#   - Redis      — rate limiting / caching
#   - Mailpit    — email capture (SMTP :1025, web UI http://localhost:8025)
#   - Uptime Kuma — uptime monitoring (web UI http://localhost:3001)
#
# (A previous version of this file also declared bare `db` and `studio`
# services. They were removed: the `db` Postgres collided with the Supabase
# CLI's own Postgres on :54322, and `studio` pointed at `kong`/`meta` services
# that never existed here, so its REST/Auth tabs could never connect. Use the
# CLI for Postgres + Studio instead.)
#
# Before starting, generate secrets:
#   MINIO_ROOT_USER=$(openssl rand -hex 8)
#   MINIO_ROOT_PASSWORD=$(openssl rand -hex 16)
#   REDIS_PASSWORD=$(openssl rand -hex 16)
#
# Then update your .env.local:
#   NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
#   NEXT_PUBLIC_SUPABASE_ANON_KEY=<anon key from `supabase status`>
#   SUPABASE_SERVICE_ROLE_KEY=<service_role key from `supabase status`>
#   RATE_LIMIT_REDIS_URL=redis://:$REDIS_PASSWORD@localhost:6379
#   SMTP_HOST=localhost
#   SMTP_PORT=1025
#   SMTP_SECURE=false
#
# Mailpit web UI: http://localhost:8025
#
# SECURITY HARDENING (A31 findings):
# - Use environment-variable passwords (never hardcode)
# - Add no_new_privileges and drop capabilities where practical
# - Add healthchecks to stateful services
# - MinIO console bound to localhost only
# - Redis and Mailpit bound to localhost only

services:
  # ---------- MinIO (S3-compatible, replaces R2 locally) ----------
  # A32-2: Pin by digest when updating (see note on db above).
  minio:
    # A32-2: Pinned by digest. To update: docker pull minio/minio:<tag> && docker inspect --format='{{index .RepoDigests 0}}' minio/minio:<tag>
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:a1a8bd4ac40ad7881a245bab97323e18f971e4d4cba2c2007ec1bedd21cbaba2
    ports:
      # A31.7: Bind MinIO API to localhost only
      - "127.0.0.1:9000:9000"
      # A31.7: Bind MinIO console to localhost only
      - "127.0.0.1:9001:9001"
    environment:
      # A31.8: Credentials must come from environment, never defaults
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # ---------- Redis (rate limiting + caching) ----------
  # A9-02: Pin Redis by digest for reproducible builds.
  # To update: docker pull redis:7-alpine && docker inspect --format='{{index .RepoDigests 0}}' redis:7-alpine
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      # Expose REDIS_PASSWORD inside the container so the healthcheck can use it.
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    # A24-04: Require authentication for Redis, even in development.
    # Exercises the same code path as production and prevents accidental
    # unauthenticated connections. Set REDIS_PASSWORD before starting.
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis-data:/data
    healthcheck:
      # A24-04: Authenticate the healthcheck ping with the same password.
      # $$REDIS_PASSWORD is Docker Compose's escape for a literal $, which the
      # shell then expands from the container environment at runtime.
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # ---------- Mailpit (email testing) ----------
  # A9-01: Mailhog (last release Oct 2021, unmaintained) replaced with Mailpit.
  # Mailpit is an actively-maintained drop-in replacement with the same ports.
  # Web UI: http://localhost:8025
  # SMTP:   localhost:1025
  # To update: docker pull axllent/mailpit:v1.30 && docker inspect --format='{{index .RepoDigests 0}}' axllent/mailpit:v1.30
  mailpit:
    image: axllent/mailpit:v1.30@sha256:3bd7c2f2696deb35a4780d152b404dceec99cb041b942c0877b3b22384714f85
    ports:
      # A31.6: Bind to localhost only (unauthenticated email viewing UI)
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    # Mailpit's defaults already bind SMTP to :1025 and Web UI to :8025.
    # No environment overrides needed for local development.
    healthcheck:
      test: ["CMD", "mailpit", "--version"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # ---------- Uptime Kuma (TASK-UPT-001) ----------
  # Lightweight uptime monitoring with Heartbeat webhook to /api/webhooks/uptime-kuma.
  # Web UI: http://localhost:3001
  # Set UPTIME_KUMA_WEBHOOK_SECRET in .env.local to match the webhook secret below.
  # After first start: create monitors + notification channel in the UI, then
  # configure a webhook notification to http://host.docker.internal:3000/api/webhooks/uptime-kuma
  # with header x-webhook-secret: <your-secret>.
  uptime-kuma:
    # A32-2: Pinned by digest for reproducible builds (was floating `:2` tag).
    # To update: docker pull louislam/uptime-kuma:2 && docker inspect --format='{{index .RepoDigests 0}}' louislam/uptime-kuma:2
    image: louislam/uptime-kuma:2@sha256:91e963bfda569ba115206e843febb446f473ab525add4e08b2b9e3beffa16985
    container_name: uptime-kuma
    ports:
      # Bind to localhost only — internal monitoring tool
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    environment:
      - UPTIME_KUMA_PORT=3001
      - UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    # A31: Drop all Linux capabilities for parity with the other services.
    # Uptime Kuma binds an unprivileged port (3001) and only writes to its
    # data volume, so it needs no elevated capabilities.
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  minio-data:
    driver: local
  redis-data:
    driver: local
  uptime-kuma-data:
    driver: local

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
