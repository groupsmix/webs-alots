# Docker Compose for local Oltigo development
# Usage: docker compose up -d
#
# This starts a local Supabase stack (Postgres + Auth + Storage + REST API),
# Redis for rate limiting, and Mailpit for email testing — so you can
# develop without needing remote services.
#
# Before starting, generate secrets:
#   POSTGRES_PASSWORD=$(openssl rand -hex 16)
#   MINIO_ROOT_USER=$(openssl rand -hex 8)
#   MINIO_ROOT_PASSWORD=$(openssl rand -hex 16)
#   REDIS_PASSWORD=$(openssl rand -hex 16)
#
# After starting, update your .env.local:
#   NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
#   NEXT_PUBLIC_SUPABASE_ANON_KEY=<anon key from supabase status>
#   SUPABASE_SERVICE_ROLE_KEY=<service_role key from supabase status>
#   RATE_LIMIT_REDIS_URL=redis://:$REDIS_PASSWORD@localhost:6379
#   SMTP_HOST=localhost
#   SMTP_PORT=1025
#   SMTP_SECURE=false
#
# Mailpit web UI: http://localhost:8025
#
# SECURITY HARDENING (A31 findings):
# - Bind Postgres to 127.0.0.1 only (not 0.0.0.0)
# - Use environment-variable passwords (never hardcode)
# - Add no_new_privileges and drop capabilities where practical
# - Add healthchecks to stateful services
# - MinIO console bound to localhost only
# - Redis and Mailhog bound to localhost only

version: "3.8"

services:
  # ---------- Supabase Postgres ----------
  # A32-2: Pin dev images by digest when updating. Run:
  #   docker pull supabase/postgres:<tag> && docker inspect --format='{{index .RepoDigests 0}}' supabase/postgres:<tag>
  # then use the full image@sha256:... reference here.
  db:
    # A32-2: Pinned by digest for reproducible builds.
    # To update: docker pull supabase/postgres:<new-tag> && docker inspect --format='{{index .RepoDigests 0}}' supabase/postgres:<new-tag>
    image: supabase/postgres:15.14.1.131@sha256:ae15b4d243438161fe310172a9f37510dd54a6b59ee55dbad3482249bf227f32
    ports:
      # A31.2 / A31.19: Bind to localhost only, not 0.0.0.0
      - "127.0.0.1:54322:5432"
    environment:
      # A31.3: Password must come from environment, never hardcoded
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: postgres
    volumes:
      - supabase-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # ---------- Supabase Studio (optional) ----------
  # A32-2: Studio tag is dated 2024-01-01 — consider bumping to a
  # recent release and pinning by digest (see A32-2 note on db above).
  studio:
    # A32-2: Pinned by digest. Bumped from 20240101 to latest release.
    image: supabase/studio:2026.05.25-sha-65c570e@sha256:c18b922ab1afdc4f25600f5c5bba701c302823013df5388927205a472ea95a10
    ports:
      # A31.5 / A31.12: Bind to localhost only (unauthenticated DB admin UI)
      - "127.0.0.1:54323:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      SUPABASE_URL: http://kong:8000
      SUPABASE_REST_URL: http://kong:8000/rest/v1/
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # ---------- MinIO (S3-compatible, replaces R2 locally) ----------
  # A32-2: Pin by digest when updating (see note on db above).
  minio:
    # A32-2: Pinned by digest. To update: docker pull minio/minio:<tag> && docker inspect --format='{{index .RepoDigests 0}}' minio/minio:<tag>
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:a1a8bd4ac40ad7881a245bab97323e18f971e4d4cba2c2007ec1bedd21cbaba2
    ports:
      # A31.7: Bind MinIO API to localhost only
      - "127.0.0.1:9000:9000"
      # A31.7: Bind MinIO console to localhost only
      - "127.0.0.1:9001:9001"
    environment:
      # A31.8: Credentials must come from environment, never defaults
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # ---------- Redis (rate limiting + caching) ----------
  # A9-02: Pin Redis by digest for reproducible builds.
  # To update: docker pull redis:7-alpine && docker inspect --format='{{index .RepoDigests 0}}' redis:7-alpine
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      # Expose REDIS_PASSWORD inside the container so the healthcheck can use it.
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    # A24-04: Require authentication for Redis, even in development.
    # Exercises the same code path as production and prevents accidental
    # unauthenticated connections. Set REDIS_PASSWORD before starting.
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis-data:/data
    healthcheck:
      # A24-04: Authenticate the healthcheck ping with the same password.
      # $$REDIS_PASSWORD is Docker Compose's escape for a literal $, which the
      # shell then expands from the container environment at runtime.
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  # ---------- Mailpit (email testing) ----------
  # A9-01: Mailhog (last release Oct 2021, unmaintained) replaced with Mailpit.
  # Mailpit is an actively-maintained drop-in replacement with the same ports.
  # Web UI: http://localhost:8025
  # SMTP:   localhost:1025
  # To update: docker pull axllent/mailpit:v1.30 && docker inspect --format='{{index .RepoDigests 0}}' axllent/mailpit:v1.30
  mailpit:
    image: axllent/mailpit:v1.30@sha256:3bd7c2f2696deb35a4780d152b404dceec99cb041b942c0877b3b22384714f85
    ports:
      # A31.6: Bind to localhost only (unauthenticated email viewing UI)
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    # Mailpit's defaults already bind SMTP to :1025 and Web UI to :8025.
    # No environment overrides needed for local development.
    healthcheck:
      test: ["CMD", "mailpit", "--version"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  supabase-db:
    driver: local
  minio-data:
    driver: local
  redis-data:
    driver: local

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
