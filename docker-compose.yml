# Docker Compose for local Oltigo development
# Usage: docker compose up -d
#
# This starts a local Supabase stack (Postgres + Auth + Storage + REST API)
# so you can develop without needing a remote Supabase project.
#
# After starting, update your .env.local:
#   NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
#   NEXT_PUBLIC_SUPABASE_ANON_KEY=<anon key from supabase status>
#   SUPABASE_SERVICE_ROLE_KEY=<service_role key from supabase status>
#
# SECURITY NOTE (A31): All ports are bound to 127.0.0.1 only.
# Do NOT change bindings to 0.0.0.0 unless behind a firewall.
# Passwords below are for LOCAL DEVELOPMENT ONLY — never reuse in staging/prod.

services:
  # ---------- Supabase Postgres ----------
  db:
    # A27-2 fix: Remove @sha256:placeholder digest suffix - Docker tries to verify
    # it against the registry and fails. Rely on tag alone until real digests collected.
    image: supabase/postgres:15.8.1.145
    ports:
      - "127.0.0.1:54322:5432"  # A31-02: Bind to localhost only
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}  # A31-03: Use env var, fallback for dev
      POSTGRES_DB: postgres
    volumes:
      - supabase-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    # A31-09: Container hardening
    read_only: true
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_READ_SEARCH
    mem_limit: 1g
    pids_limit: 256
    networks:
      - backend

  # ---------- Supabase Studio (optional) ----------
  studio:
    image: supabase/studio:20240101@sha256:placeholder
    # A31-04: Pin to digest (replace placeholder with actual digest from registry)
    ports:
      - "127.0.0.1:54323:3000"  # A31-05: Bind to localhost only
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      SUPABASE_URL: http://kong:8000
      SUPABASE_REST_URL: http://kong:8000/rest/v1/
    depends_on:
      db:
        condition: service_healthy  # A31-12: Wait for healthy DB
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 128
    networks:
      - backend

  # ---------- MinIO (S3-compatible, replaces R2 locally) ----------
  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    # A31-06: Pinned to a specific release tag instead of :latest
    ports:
      - "127.0.0.1:9000:9000"   # A31-07: Bind to localhost only
      - "127.0.0.1:9001:9001"   # A31-07: Console also localhost only
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}      # A31-08: Use env var
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}  # A31-08: Use env var
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 128
    networks:
      - backend
    labels:
      com.oltigo.environment: "development"
      com.oltigo.service: "object-storage"

# A31-09: Isolated network — services communicate only via this bridge
networks:
  backend:
    driver: bridge

volumes:
  supabase-db:
    labels:
      com.oltigo.environment: "development"
      com.oltigo.data: "postgres"
  minio-data:
    labels:
      com.oltigo.environment: "development"
      com.oltigo.data: "object-storage"
