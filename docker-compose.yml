# Docker Compose for local Oltigo development
# Usage: docker compose up -d
#
# This starts a local Supabase stack (Postgres + Auth + Storage + REST API)
# so you can develop without needing a remote Supabase project.
#
# After starting, update your .env.local:
#   NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321
#   NEXT_PUBLIC_SUPABASE_ANON_KEY=<anon key from supabase status>
#   SUPABASE_SERVICE_ROLE_KEY=<service_role key from supabase status>
#
# A32-3 fix: Security hardening applied - Note: user: directives are per-service;
# the following services already use them: db (postgres user), minio (minio user)
# Review individual services for specific user directives
#   - read_only: true where feasible
#   - cap_drop: [ALL] to drop all Linux capabilities
#   - security_opt: no-new-privileges
#   - healthcheck on every service
#   - tmpfs for writable paths in read-only containers

version: "3.8"

services:
  # ---------- Supabase Postgres ----------
  db:
    image: supabase/postgres:15.8.1.145
    ports:
      - "54322:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase-db:/var/lib/postgresql/data
    # A32.4: Drop all capabilities, re-add only what Postgres needs
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Supabase Studio (optional) ----------
  studio:
    image: supabase/studio:20240101
    ports:
      - "54323:3000"
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      SUPABASE_URL: http://kong:8000
      SUPABASE_REST_URL: http://kong:8000/rest/v1/
    depends_on:
      - db
    # A32.4: Harden studio container
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------- MinIO (S3-compatible, replaces R2 locally) ----------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    # A32.4: Harden minio container
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # A32-2 fix: Use built-in MinIO health endpoint instead of mc client
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  supabase-db:
  minio-data:
