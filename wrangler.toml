#:schema node_modules/wrangler/config-schema.json
name = "webs-alots"
main = "worker-cron-handler.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Static assets served by the Workers runtime
# NOTE: The "ASSETS" binding name is reserved by Cloudflare Pages, so do NOT
# add pages_build_output_dir here — it would cause Pages to parse this file
# and reject the binding. Pages output dir is configured via the dashboard API.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ---- R2 Storage Binding ----
# File uploads (logos, photos, documents) stored in Cloudflare R2
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "webs-alots-uploads"

# ---- Rate Limiting KV Namespace ----
# Persistent rate limiting using Cloudflare KV
# Enables rate limit counters to survive Worker restarts
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "7ac37dff0a794542b0c766f38e73f105"
preview_id = "7ac37dff0a794542b0c766f38e73f105"

# ---- Feature Flags KV Namespace ----
# Runtime feature flags using Cloudflare KV
# Enables per-clinic feature overrides without redeployment
[[kv_namespaces]]
binding = "FEATURE_FLAGS_KV"
id = "610b3748bba545e2b083473b9023d66f"
preview_id = "610b3748bba545e2b083473b9023d66f"

# ---- Non-Sensitive Environment Variables ----
[vars]
ROOT_DOMAIN = "oltigo.com"
NEXT_PUBLIC_SITE_URL = "https://oltigo.com"
R2_BUCKET_NAME = "webs-alots-uploads"
# Use Cloudflare KV for distributed rate limiting in production
# Falls back to Supabase → in-memory if KV is unavailable
RATE_LIMIT_BACKEND = "kv"
# Seed users from migration 00019 have been deleted in production.
# This flag tells instrumentation.ts not to block startup.
SEED_PASSWORDS_ROTATED = "true"

# ---- Workers Routes (custom domain + wildcard subdomains) ----
routes = [
  { pattern = "oltigo.com/*", zone_name = "oltigo.com" },
  { pattern = "*.oltigo.com/*", zone_name = "oltigo.com" },
]

# ---- Cron Triggers ----
# Appointment reminders: every 30 minutes
# Subscription renewal check: daily at 2am UTC
[triggers]
crons = ["*/30 * * * *", "*/5 * * * *", "0 2 * * *"]

# ---- Staging Environment ----
# Deploy with: wrangler deploy --env staging
# URL: staging.oltigo.com
# Uses separate Supabase project for data isolation
[env.staging]
name = "webs-alots-staging"
main = "worker-cron-handler.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
routes = [
  { pattern = "staging.oltigo.com/*", zone_name = "oltigo.com" },
]

[env.staging.assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[env.staging.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "webs-alots-uploads-staging"

[env.staging.vars]
ROOT_DOMAIN = "staging.oltigo.com"
NEXT_PUBLIC_SITE_URL = "https://staging.oltigo.com"
R2_BUCKET_NAME = "webs-alots-uploads-staging"
RATE_LIMIT_BACKEND = "kv"
SEED_PASSWORDS_ROTATED = "true"

# ---- Staging Cron Triggers ----
# Same schedule as production
[env.staging.triggers]
crons = ["*/30 * * * *", "*/5 * * * *", "0 2 * * *"]
