# =============================================================================
# Cloudflare Workers Configuration — Oltigo Health
# =============================================================================
#
# AUDIT F-06: This file documents the Worker's bindings, routes, and settings
# as infrastructure-as-code. It was previously managed entirely via Cloudflare
# dashboard / CI secrets, making the deployment topology opaque.
#
# The `opennextjs-cloudflare` build tool generates its own wrangler config
# at build time. This file serves as the base that `wrangler deploy` merges
# with the generated output. Environment-specific overrides (API tokens,
# secrets) remain in CI secrets / Cloudflare dashboard.
#
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/
# Last key rotation: 2026-05-29
# =============================================================================

name = "webs-alots"
main = ".open-next/worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# ── Account (set via CLOUDFLARE_ACCOUNT_ID env in CI) ─────────────────
# account_id is intentionally omitted — it is injected by the
# cloudflare/wrangler-action in CI to avoid leaking it in the repo.

# ── Routes ────────────────────────────────────────────────────────────
# AUDIT-LB3: The Worker serves all requests for the root domain and all
# subdomains. These routes are deploy-verifiable IaC — if they are
# missing from wrangler.toml, the Worker will not receive traffic.
routes = [
  { pattern = "oltigo.com/*", zone_name = "oltigo.com" },
  { pattern = "*.oltigo.com/*", zone_name = "oltigo.com" },
]

# ── Static Assets ─────────────────────────────────────────────────────
# Serves _next/static/*, favicon, images, etc. from the Cloudflare edge.
# Without this, CSS/JS assets return 404 because the Worker doesn't have
# access to the build output's static files.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ── KV Namespaces ─────────────────────────────────────────────────────
# Rate-limiting counters (shared across all edge locations).
# INF-002: Rate limiter MUST use KV in production to prevent per-isolate
# counter fragmentation.
#
# HIGH-3: Provision KV namespaces BEFORE deploying this config:
#   wrangler kv:namespace create RATE_LIMIT_KV
#   wrangler kv:namespace create RATE_LIMIT_KV --preview
#   Then paste the returned IDs below.
#
# A31-1: These are the canonical production KV namespace IDs (not
# placeholders). They are resource identifiers, not secrets.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "7ac37dff0a794542b0c766f38e73f105"
preview_id = "854c78ea8c9442ed8706d3ec31fe292e"

# ── Durable Objects ───────────────────────────────────────────────────
# H-03 (DEFERRED): Strongly consistent rate limiting via a RateLimiterDO
# Durable Object was scaffolded in src/lib/rate-limit-do.ts, but the
# @opennextjs/cloudflare build does NOT re-export custom Durable Object
# classes from the generated entrypoint (.open-next/worker.js). Declaring the
# binding/migration here therefore made every `wrangler deploy` fail with:
#   "Your Worker depends on the following Durable Objects, which are not
#    exported in your entrypoint file: RateLimiterDO."
# blocking ALL production deploys. The DO is unused (RATE_LIMIT_BACKEND is
# kv/memory, never "do") and the limiter factory in rate-limit.ts already
# falls back gracefully when the binding is absent, so the binding and its
# migration are removed until the DO is properly wired through OpenNext
# (e.g. a custom worker entry that re-exports RateLimiterDO).

# ── Cloudflare Queues ─────────────────────────────────────────────────
# PERF: Replace the 15-minute cron-poll notification pattern with a
# push-based queue. Notifications are enqueued at the point of the
# triggering event and delivered within seconds instead of up to 15 min.
#
# Provision BEFORE deploying:
#   wrangler queues create notification-queue
#   wrangler queues create notification-queue-dlq      # dead-letter queue
#
# The consumer is the Worker itself (defined in [[queues.consumers]] below).
# The producer binding (NOTIFICATION_QUEUE) is used by enqueueNotification().
#
# Ref: https://developers.cloudflare.com/queues/
[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "notification-queue"

[[queues.consumers]]
queue = "notification-queue"
max_batch_size = 25
max_batch_timeout = 5          # seconds — flush batch after 5s even if not full
max_retries = 3
dead_letter_queue = "notification-queue-dlq"

# ── R2 Buckets ────────────────────────────────────────────────────────
# AUDIT-LB3: IaC — PHI file storage (encrypted uploads).
# INF-003: Production bucket is declared at the top level. Staging overrides
# below to prevent cross-environment PHI contamination.
[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "webs-alots-uploads"

# ── Environment Variables (non-secret) ────────────────────────────────
# Secrets (API keys, encryption keys) are set via `wrangler secret put`
# or Cloudflare dashboard. Only non-sensitive defaults go here.
[vars]
NODE_ENV = "production"
# FIXED: KV binding is now resolved correctly via getWorkerBinding() which uses
# getCloudflareContext().env instead of globalThis. The rate limiter can now use
# the distributed KV backend for production-grade protection.
# See: src/lib/cf-bindings.ts, src/lib/rate-limit.ts:440-541
RATE_LIMIT_BACKEND = "kv"
# PHI masking policy — must match what was set in CI build time env.
# See SECURITY.md § PHI Masking, findings #7/#13
NEXT_PUBLIC_DATA_MASKING = "partial"

# ── Production Environment ────────────────────────────────────────────
# INF-004: Explicit production block prevents top-level debug toggles
# from silently leaking into production. Deploy with: wrangler deploy --env production
# W8-A31-01: Wrangler v3+/v4 env blocks do NOT inherit top-level bindings.
# Every binding (kv_namespaces, routes, triggers, observability, limits) must
# be explicitly redeclared per environment.
[env.production]
name = "webs-alots"
[env.production.assets]
directory = ".open-next/assets"
binding = "ASSETS"
[env.production.vars]
NODE_ENV = "production"
# FIXED: KV binding now resolved correctly via getWorkerBinding().
# Rate limiter is distributed, protected in production.
RATE_LIMIT_BACKEND = "kv"
# PHI masking must be "partial" in production per SECURITY.md.
NEXT_PUBLIC_DATA_MASKING = "partial"

[[env.production.queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "notification-queue"

[[env.production.queues.consumers]]
queue = "notification-queue"
max_batch_size = 25
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "notification-queue-dlq"

[[env.production.r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "webs-alots-uploads"

# W8-A31-01: KV namespace binding (was missing — rate limiter fell open)
[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "7ac37dff0a794542b0c766f38e73f105"
preview_id = "854c78ea8c9442ed8706d3ec31fe292e"

# W8-A31-01: Routes (was missing — worker would not receive traffic)
[env.production.routes]
routes = [
  { pattern = "oltigo.com/*", zone_name = "oltigo.com" },
  { pattern = "*.oltigo.com/*", zone_name = "oltigo.com" },
]

# W8-A31-01: Cron triggers (was missing — scheduled jobs would not run)
[env.production.triggers]
crons = [
  "*/5 * * * *",
  "*/15 * * * *",
  "*/30 * * * *",
  "0 * * * *",
  "0 2 * * *",
  "0 3 * * *",
  "0 4 * * *",
  "0 5 * * *",
]

# W8-A31-01: Observability (was missing — Workers Logs disabled per-env)
[env.production.observability]
enabled = true

# W8-A31-01: Limits (was missing — default CPU limit instead of 50ms)
[env.production.limits]
cpu_ms = 50

# ── Staging Environment ───────────────────────────────────────────────
[env.staging]
name = "webs-alots-staging"
[env.staging.assets]
directory = ".open-next/assets"
binding = "ASSETS"
[env.staging.vars]
NODE_ENV = "production"
# FIXED: KV binding now resolved correctly via getWorkerBinding().
RATE_LIMIT_BACKEND = "kv"
# PHI masking must be "partial" in staging as well.
NEXT_PUBLIC_DATA_MASKING = "partial"

# INF-003: Staging uses a separate R2 bucket to prevent cross-environment
# PHI contamination. Create with: wrangler r2 bucket create webs-alots-uploads-staging
[[env.staging.queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "notification-queue-staging"

[[env.staging.queues.consumers]]
queue = "notification-queue-staging"
max_batch_size = 25
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "notification-queue-staging-dlq"

[[env.staging.r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "webs-alots-uploads-staging"

# W8-A31-01: KV namespace binding for staging
#
# etap1 audit finding #5 — DO NOT MERGE THIS FILE'S STAGING BLOCK
# until the steps below are completed.
#
# CURRENT STATE (launch blocker): the IDs below are the SAME ones used by
# [[env.production.kv_namespaces]] above. That means rate-limit counters
# are shared between staging and production:
#
#   • Load tests on staging exhaust prod counters → real users get 429s.
#   • A prod rate-limit event blocks staging testing.
#   • Staging auth attempts count against prod IP / user buckets.
#
# Action required before launch (run once on a workstation with `wrangler login`):
#
#   wrangler kv:namespace create RATE_LIMIT_KV_STAGING
#   wrangler kv:namespace create RATE_LIMIT_KV_STAGING --preview
#
# Then replace the two `id` / `preview_id` values below with the new
# staging-specific IDs returned by the wrangler commands, and verify
# isolation by tailing logs on both envs during a staging load test:
#
#   wrangler tail --env staging   # should see KV ops; prod tail should not.
#
# Until the IDs are replaced, treat staging and production as a single
# rate-limit surface. R2 buckets are already correctly separated
# (webs-alots-uploads-staging vs webs-alots-uploads).
[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "7ac37dff0a794542b0c766f38e73f105"          # TODO(audit-#5): replace with staging KV ID
preview_id = "854c78ea8c9442ed8706d3ec31fe292e"  # TODO(audit-#5): replace with staging KV preview ID

# W8-A31-01: Routes for staging (uses staging subdomain)
[env.staging.routes]
routes = [
  { pattern = "staging.oltigo.com/*", zone_name = "oltigo.com" },
  { pattern = "*.staging.oltigo.com/*", zone_name = "oltigo.com" },
]

# W8-A31-01: Cron triggers for staging
[env.staging.triggers]
crons = [
  "*/5 * * * *",
  "*/15 * * * *",
  "*/30 * * * *",
  "0 * * * *",
  "0 2 * * *",
  "0 3 * * *",
  "0 4 * * *",
  "0 5 * * *",
]

# W8-A31-01: Observability for staging
[env.staging.observability]
enabled = true

# W8-A31-01: Limits for staging
[env.staging.limits]
cpu_ms = 50

# ── Limits ────────────────────────────────────────────────────────────
# H-04: Workers Unbound removes the 50ms CPU ceiling. Routes that need
# sustained compute (AI Manager, Stripe webhook, CMI callback, PDF
# generation) can now run for up to 30 000 ms without hitting CPU limits.
#
# Pre-requisite: The account must be on Workers Paid + Unbound pricing.
# Check: Cloudflare dashboard → Workers & Pages → Overview → Plan.
# If still on Bundled pricing, the deploy will fail — uncomment the
# 50ms fallback below until the plan is upgraded.
#
# [limits]
# cpu_ms = 50  # Bundled-plan fallback — uncomment if Unbound is not active

# ── Observability ─────────────────────────────────────────────────────
# A40.2: Enable Workers Logs for request-rate, 4xx-rate, and cold-start
# metrics visibility. Sentry catches exceptions but not operational telemetry.
[observability]
enabled = true

# ── Cron Triggers ─────────────────────────────────────────────────────
# IaC — scheduled jobs. These must match worker-cron-handler.ts CRON_ROUTES
# exactly. `wrangler deploy` registers them with Cloudflare automatically.
# See also: scripts/check-cron-mapping.ts (CI guard).
[triggers]
crons = [
  "*/5 * * * *",  # every 5 min — uptime monitor + WhatsApp alerts
  "*/15 * * * *", # every 15 min — notification queue flush
  "*/30 * * * *", # every 30 min — appointment reminders
  "0 * * * *",    # hourly — R2 cleanup + feedback + rebooking reminders
  "0 2 * * *",    # 02:00 UTC daily — subscription billing
  "0 3 * * *",    # 03:00 UTC daily — GDPR patient data purge
  "0 4 * * *",    # 04:00 UTC daily — M-03/M-04 dedup table TTL purge
  "0 5 * * *",    # 05:00 UTC daily — BL-002 Stripe payment reconciliation
]

# ── Build ─────────────────────────────────────────────────────────────
# The build command is handled by CI (npm run build:cf), not by wrangler.
# [build]
# command = "npm run build:cf"

# ── Supabase Connection Pooling ───────────────────────────────────────
# Cloudflare Workers have no persistent TCP connections (each invocation
# is a fresh isolate). At 1 000+ concurrent tenants, direct connections
# to Supabase's port 5432 will exhaust the DB connection limit.
#
# Fix: use Supabase's built-in PgBouncer (transaction pooler) on port 6543.
#
# Set these two secrets in CI / Cloudflare dashboard:
#
#   NEXT_PUBLIC_SUPABASE_URL — already set (project URL)
#   SUPABASE_SERVICE_ROLE_KEY — already set
#
# Add these additional secrets for pooled connections:
#
#   SUPABASE_POOLER_URL — the transaction-pooler URL from Supabase dashboard
#     Format: postgresql://postgres.[project-ref]@aws-0-eu-west-3.pooler.supabase.com:6543/postgres
#     Used by: server-side Supabase client for all DB operations in Workers
#
#   DIRECT_URL — direct Postgres URL (port 5432), used ONLY for migrations
#     Format: postgresql://postgres:[password]@db.[project-ref].supabase.co:5432/postgres
#     Used by: `supabase db push` / Prisma migrations (never in Worker code)
#
# Reference: https://supabase.com/docs/guides/database/connecting-to-postgres#connection-pooler
#
# TODO: Update src/lib/supabase-server.ts to read from SUPABASE_POOLER_URL
# when available, falling back to NEXT_PUBLIC_SUPABASE_URL for backward
# compatibility. This is a one-line change per client factory function.
