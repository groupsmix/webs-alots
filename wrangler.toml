# =============================================================================
# Cloudflare Workers Configuration — Oltigo Health
# =============================================================================
#
# AUDIT F-06: This file documents the Worker's bindings, routes, and settings
# as infrastructure-as-code. It was previously managed entirely via Cloudflare
# dashboard / CI secrets, making the deployment topology opaque.
#
# The `opennextjs-cloudflare` build tool generates its own wrangler config
# at build time. This file serves as the base that `wrangler deploy` merges
# with the generated output. Environment-specific overrides (API tokens,
# secrets) remain in CI secrets / Cloudflare dashboard.
#
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/
# =============================================================================

name = "webs-alots"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ── Account (set via CLOUDFLARE_ACCOUNT_ID env in CI) ─────────────────
# account_id is intentionally omitted — it is injected by the
# cloudflare/wrangler-action in CI to avoid leaking it in the repo.

# ── Routes ────────────────────────────────────────────────────────────
# The Worker serves all requests for the root domain and all subdomains.
# Wildcard routing is configured in Cloudflare DNS (CNAME * -> Workers).
# routes = [
#   { pattern = "oltigo.com/*", zone_name = "oltigo.com" },
#   { pattern = "*.oltigo.com/*", zone_name = "oltigo.com" },
# ]

# ── KV Namespaces ─────────────────────────────────────────────────────
# 31.15: IaC — rate-limiting counters (shared across all edge locations).
# Wrangler requires a non-empty namespace ID at build time, so the actual
# binding is configured via Cloudflare dashboard per-environment.
# The binding configuration is:
#   [[kv_namespaces]]
#   binding = "RATE_LIMIT_KV"
#   id = "<KV_NAMESPACE_ID>"     # from `wrangler kv namespace list`

# ── R2 Buckets ────────────────────────────────────────────────────────
# 31.15: IaC — PHI file storage (encrypted uploads).
# R2 binding is configured via Cloudflare dashboard per-environment.
# The binding configuration is:
#   [[r2_buckets]]
#   binding = "UPLOADS_BUCKET"
#   bucket_name = "webs-alots-uploads"

# ── Environment Variables (non-secret) ────────────────────────────────
# Secrets (API keys, encryption keys) are set via `wrangler secret put`
# or Cloudflare dashboard. Only non-sensitive defaults go here.
[vars]
NODE_ENV = "production"
RATE_LIMIT_BACKEND = "supabase"

# ── Staging Environment ───────────────────────────────────────────────
[env.staging]
name = "webs-alots-staging"
[env.staging.vars]
NODE_ENV = "production"
RATE_LIMIT_BACKEND = "supabase"

# ── Limits ────────────────────────────────────────────────────────────
[limits]
cpu_ms = 50  # Default: 50ms CPU time per request (Workers Paid plan)

# ── Observability ─────────────────────────────────────────────────────
# A40.2: Enable Workers Logs for request-rate, 4xx-rate, and cold-start
# metrics visibility. Sentry catches exceptions but not operational telemetry.
[observability]
enabled = true

# ── Cron Triggers ─────────────────────────────────────────────────────
# 31.18: IaC — scheduled jobs (GDPR purge, reminders, stale-booking sweep).
# Cron triggers are configured via Cloudflare dashboard because
# opennextjs-cloudflare generates its own wrangler config at build time
# and may conflict with user-defined triggers.
# The intended schedule is:
#   [triggers]
#   crons = [
#     "0 2 * * *",    # 02:00 UTC daily — GDPR patient data purge
#     "0 8 * * *",    # 08:00 UTC daily — appointment reminders
#     "*/15 * * * *", # every 15 min — stale booking sweep
#   ]

# ── Build ─────────────────────────────────────────────────────────────
# The build command is handled by CI (npm run build:cf), not by wrangler.
# [build]
# command = "npm run build:cf"
