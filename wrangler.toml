# ============================================================
# Cloudflare Workers Configuration — Oltigo Health Platform
# ============================================================
# Audit Finding #39: This file was missing from the repository.
# It declaratively configures the Worker, cron triggers, KV/R2
# bindings, and compatibility settings so the deployment is
# reproducible and version-controlled.
#
# Sensitive values (API tokens, encryption keys) are set via
# `wrangler secret put <KEY>` and are NOT stored here.
# ============================================================

name = "webs-alots"
main = ".open-next/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ── Account (set via env or `wrangler login`) ──
# account_id is injected by CI via CLOUDFLARE_ACCOUNT_ID secret.
# Uncomment and fill if deploying locally:
# account_id = ""

# ── Build ──
[build]
command = "npm run build:cf"

# ── Observability ──
[observability]
enabled = true

# ── Cron Triggers ──
# These fire HTTP requests to the Worker, which routes them to
# the corresponding /api/cron/* endpoints. Each endpoint verifies
# the CRON_SECRET bearer token before processing.
[triggers]
crons = [
  # Appointment reminders — every 30 minutes
  "*/30 * * * *",
  # Notification queue flush — every 5 minutes
  "*/5 * * * *",
  # Billing cycle check — daily at 02:00 UTC
  "0 2 * * *",
  # GDPR data purge — daily at 03:00 UTC
  "0 3 * * *",
  # R2 orphan cleanup — daily at 04:00 UTC
  "0 4 * * *",
  # Post-appointment feedback — every 2 hours
  "0 */2 * * *",
  # Rebooking reminders — daily at 09:00 UTC (10:00 Morocco)
  "0 9 * * *",
]

# ── KV Namespace Bindings ──
# Used by the distributed rate limiter (src/lib/rate-limit.ts).
# Create with: wrangler kv namespace create RATE_LIMIT_KV
# Then paste the id below.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "" # TODO: Fill with actual KV namespace ID after creation

# ── R2 Bucket Bindings ──
# Primary upload bucket for clinic files (logos, documents, PHI).
[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "webs-alots-uploads"

# Backup bucket for database dumps.
[[r2_buckets]]
binding = "BACKUPS_BUCKET"
bucket_name = "webs-alots-backups"

# ── Environment Variables (non-secret) ──
[vars]
RATE_LIMIT_BACKEND = "kv"

# ── Staging Environment ──
[env.staging]
name = "webs-alots-staging"

[env.staging.vars]
RATE_LIMIT_BACKEND = "kv"

[env.staging.triggers]
crons = [
  # Staging runs crons less frequently to avoid noise
  "0 */1 * * *",
  "0 3 * * *",
  "0 4 * * *",
]
