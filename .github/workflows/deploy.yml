# ═══════════════════════════════════════════════════════════════════════════════
# AUTO-DEPLOY TO CLOUDFLARE WORKERS
#
# This workflow automatically deploys your site when you push to main.
# 
# TO DEPLOY:
# 1. Push code to main branch → Auto deploys!
# 2. Or go to GitHub → Actions → "Deploy to Cloudflare" → Run workflow
#
# SETUP REQUIRED (one-time):
# Go to GitHub repo → Settings → Secrets and variables → Actions
# Add these secrets:
#   - CLOUDFLARE_API_TOKEN (from Cloudflare dashboard)
#   - CLOUDFLARE_ACCOUNT_ID (from Cloudflare dashboard)
#   - NEXT_PUBLIC_SUPABASE_URL (from Supabase dashboard)
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY (from Supabase dashboard)
#   - SUPABASE_SERVICE_ROLE_KEY (from Supabase dashboard)
#   - JWT_SECRET (generate: openssl rand -hex 64)
#   - CRON_SECRET (generate: openssl rand -hex 32)
# ═══════════════════════════════════════════════════════════════════════════════

name: 🚀 Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  # AI Content Engine
  CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
  # Affiliate Networks
  CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
  CJ_PUBLISHER_ID: ${{ secrets.CJ_PUBLISHER_ID }}
  PARTNERSTACK_API_KEY: ${{ secrets.PARTNERSTACK_API_KEY }}
  ADMITAD_API_KEY: ${{ secrets.ADMITAD_API_KEY }}
  ADMITAD_PUBLISHER_ID: ${{ secrets.ADMITAD_PUBLISHER_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # Fail fast if no Cloudflare credentials are configured
      - name: Verify Cloudflare credentials
        run: |
          if [ -z "$CF_API_TOKEN" ] && [ -z "$CF_API_KEY" ]; then
            echo "::error::No Cloudflare credentials found. Set CLOUDFLARE_API_TOKEN or CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL in GitHub repo Settings → Secrets and variables → Actions"
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Fail fast if required secrets are missing
      - name: Verify required secrets
        run: |
          missing=""
          [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] && missing="$missing NEXT_PUBLIC_SUPABASE_URL"
          [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] && missing="$missing NEXT_PUBLIC_SUPABASE_ANON_KEY"
          [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && missing="$missing SUPABASE_SERVICE_ROLE_KEY"
          [ -z "$JWT_SECRET" ] && missing="$missing JWT_SECRET"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Configure these in GitHub repo Settings → Secrets and variables → Actions"
            exit 1
          fi

      # Build the OpenNext bundle for Cloudflare Workers
      - run: npx @opennextjs/cloudflare build

      # Deploy to Cloudflare Workers via opennextjs-cloudflare
      # Supports both API Token (CLOUDFLARE_API_TOKEN) and
      # Global API Key (CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL)
      - name: Deploy to Cloudflare
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Set Worker secrets that are needed at runtime (not inlined at build time).
      # CRON_SECRET is required for the scheduled handler to authenticate with /api/cron/publish.
      - name: Set Worker secrets
        run: |
          if [ -n "${{ secrets.CRON_SECRET }}" ]; then
            echo "${{ secrets.CRON_SECRET }}" | npx wrangler secret put CRON_SECRET
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
