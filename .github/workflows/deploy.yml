# ═══════════════════════════════════════════════════════════════════════════════
# AUTO-DEPLOY TO CLOUDFLARE WORKERS
#
# This workflow automatically deploys your site when you push to main.
# It also automatically creates the R2 bucket and KV namespace if they don't exist.
#
# TO DEPLOY:
# 1. Push code to main branch → Auto deploys!
# 2. Or go to GitHub → Actions → "Deploy to Cloudflare" → Run workflow
#
# SETUP REQUIRED (one-time):
# Go to GitHub repo → Settings → Secrets and variables → Actions
# Add these secrets:
#   - CLOUDFLARE_API_TOKEN (from Cloudflare dashboard)
#   - CLOUDFLARE_ACCOUNT_ID (from Cloudflare dashboard)
#   - NEXT_PUBLIC_SUPABASE_URL (from Supabase dashboard)
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY (from Supabase dashboard)
#   - SUPABASE_SERVICE_ROLE_KEY (from Supabase dashboard)
#   - SUPABASE_DB_URL (postgresql://postgres:PASSWORD@db.PROJECT_REF.supabase.co:5432/postgres?sslmode=require)
#   - JWT_SECRET (generate: openssl rand -hex 64)
#   - CRON_SECRET (generate: openssl rand -hex 32)
# Optional admin bootstrap secrets:
#   - ADMIN_BOOTSTRAP_EMAIL (your admin email)
#   - ADMIN_BOOTSTRAP_PASSWORD (your admin password)
#   - ADMIN_BOOTSTRAP_NAME (your name, optional)
#   - ADMIN_BOOTSTRAP_ROLE (super_admin or admin, default: super_admin)
# ═══════════════════════════════════════════════════════════════════════════════

name: 🚀 Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
  CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
  CJ_PUBLISHER_ID: ${{ secrets.CJ_PUBLISHER_ID }}
  PARTNERSTACK_API_KEY: ${{ secrets.PARTNERSTACK_API_KEY }}
  ADMITAD_API_KEY: ${{ secrets.ADMITAD_API_KEY }}
  ADMITAD_PUBLISHER_ID: ${{ secrets.ADMITAD_PUBLISHER_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      # ── Install psql for direct DB migration ─────────────────────────────────
      - name: Install psql and apply database migrations
        run: |
          echo "🔄 Installing psql..."
          apt-get update && apt-get install -y postgresql-client 2>&1 | tail -5

          echo "🔄 Applying database migrations..."
          DB_URL="${{ secrets.SUPABASE_DB_URL }}"

          if [ -z "$DB_URL" ]; then
            echo "⚠️ SUPABASE_DB_URL not set, skipping DB migrations"
            exit 0
          fi

          # Apply all migration files in order
          if [ -d "supabase/migrations" ]; then
            for file in $(ls supabase/migrations/*.sql 2>/dev/null | sort); do
              echo "Applying migration: $file"
              psql "$DB_URL" -f "$file" 2>&1 || echo "Migration may have already been applied: $file"
            done
          fi

          # Apply schema changes (add missing columns - backward compatible)
          psql "$DB_URL" -c "ALTER TABLE categories ADD COLUMN IF NOT EXISTS description text DEFAULT '';" 2>&1 || echo "description column may exist"
          psql "$DB_URL" -c "ALTER TABLE categories ADD COLUMN IF NOT EXISTS taxonomy_type text DEFAULT 'general';" 2>&1 || echo "taxonomy_type column may exist"
          psql "$DB_URL" -c "ALTER TABLE categories ADD CONSTRAINT IF NOT EXISTS categories_taxonomy_type_check CHECK (taxonomy_type IN ('general', 'budget', 'occasion', 'recipient', 'brand'));" 2>&1 || echo "constraint may exist"

          echo "✅ Database schema updated"

      # ── Create R2 bucket if not exists ──────────────────────────────
      - name: Create R2 bucket (if not exists)
        run: |
          echo "🔧 Checking R2 bucket..."
          npx wrangler r2 bucket create next-inc-cache 2>&1 || echo "Bucket may already exist, continuing..."

      # ── Create KV namespace if not exists ────────────────────────────
      - name: Create KV namespace (if not exists)
        run: |
          echo "🔧 Checking KV namespace..."
          KV_ID=$(npx wrangler kv:namespace create RATE_LIMIT_KV 2>&1 | grep -o '"id":"[^"]*"' | cut -d'"' -f4 || echo "")
          if [ -n "$KV_ID" ]; then
            echo "Created KV namespace: $KV_ID"
            # Update wrangler.jsonc with the new KV ID
            sed -i "s/\"id\": \"[^\"]*\"/\"id\": \"$KV_ID\"/" wrangler.jsonc
            echo "Updated wrangler.jsonc with KV namespace ID"
          else
            echo "KV namespace may already exist, checking wrangler.jsonc..."
          fi

      # ── Build OpenNext bundle ─────────────────────────────────────────
      - name: Build OpenNext bundle
        run: npx @opennextjs/cloudflare build

      # ── Deploy to Cloudflare ──────────────────────────────────────────
      - name: Deploy to Cloudflare
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Set Worker secrets ────────────────────────────────────────────
      - name: Set Worker secrets
        run: |
          echo "${{ secrets.CRON_SECRET }}" | npx wrangler secret put CRON_SECRET --name affilite-mix 2>&1 || true
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET --name affilite-mix 2>&1 || true
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --name affilite-mix 2>&1 || true
          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" | npx wrangler secret put NEXT_PUBLIC_SUPABASE_URL --name affilite-mix 2>&1 || true
          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" | npx wrangler secret put NEXT_PUBLIC_SUPABASE_ANON_KEY --name affilite-mix 2>&1 || true
          # Optional secrets — only set if configured in GitHub secrets
          if [ -n "${{ secrets.RESEND_API_KEY }}" ]; then
            echo "${{ secrets.RESEND_API_KEY }}" | npx wrangler secret put RESEND_API_KEY --name affilite-mix 2>&1 || true
          fi
          if [ -n "${{ secrets.SENTRY_DSN }}" ]; then
            echo "${{ secrets.SENTRY_DSN }}" | npx wrangler secret put SENTRY_DSN --name affilite-mix 2>&1 || true
          fi
          if [ -n "${{ secrets.INTERNAL_API_TOKEN }}" ]; then
            echo "${{ secrets.INTERNAL_API_TOKEN }}" | npx wrangler secret put INTERNAL_API_TOKEN --name affilite-mix 2>&1 || true
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Bootstrap admin user (if secrets provided) ───────────────────
      - name: Bootstrap admin user
        run: |
          if [ -z "${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}" ] || [ -z "${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}" ]; then
            echo "ℹ️ Admin bootstrap secrets not set, skipping admin creation"
            exit 0
          fi

          echo "🔄 Bootstrapping admin user..."
          DB_URL="${{ secrets.SUPABASE_DB_URL }}"

          if [ -z "$DB_URL" ]; then
            echo "⚠️ Cannot bootstrap admin: SUPABASE_DB_URL not set"
            exit 0
          fi

          ADMIN_EMAIL="${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}"
          ADMIN_PASSWORD="${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}"
          ADMIN_NAME="${{ secrets.ADMIN_BOOTSTRAP_NAME || 'Admin' }}"
          ADMIN_ROLE="${{ secrets.ADMIN_BOOTSTRAP_ROLE || 'super_admin' }}"

          # Create admin user using psql
          psql "$DB_URL" -c "
            INSERT INTO admin_users (email, password_hash, name, role, is_active)
            VALUES ('$ADMIN_EMAIL', crypt('$ADMIN_PASSWORD', gen_salt('bf')), '$ADMIN_NAME', '$ADMIN_ROLE', true)
            ON CONFLICT (email) DO UPDATE SET
              password_hash = EXCLUDED.password_hash,
              name = EXCLUDED.name,
              role = EXCLUDED.role,
              updated_at = NOW();
          " 2>&1 && echo "✅ Admin user ready: $ADMIN_EMAIL" || echo "⚠️ Admin user creation skipped (may already exist or schema not ready)"

      # ── Verify deployment ─────────────────────────────────────────────
      - name: Verify deployment
        run: |
          echo "✅ Deployment complete!"
          echo "🌐 Testing site..."
          sleep 5
          curl -s -o /dev/null -w "HTTP %{http_code}" --max-time 10 https://wristnerd.xyz/ || echo "Site may need DNS propagation"
