# =============================================================================
# Deploy — Cloudflare Workers production / staging deploy
# =============================================================================
#
# Triggers on push to `main` (→ production) or `staging` (→ staging).
# Deploys TWO Workers from the same workflow run:
#
#   1. webs-alots     — main Next.js app (built via OpenNext)
#   2. webs-alots-ai  — AI route Worker (plain fetch handler in workers/ai/)
#
# See workers/ai/README.md for why the split exists.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN   — scoped to Workers Scripts:Edit on BOTH scripts,
#                            Account Settings:Read, Workers KV Storage:Edit,
#                            Workers Routes:Edit on the oltigo.com zone
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID (not a secret, but kept
#                            out of wrangler.toml to avoid leaking it in forks)
#
# Required Cloudflare Worker secrets (set ONCE per worker via
# `wrangler secret put`, or via the dashboard — NOT pushed by this workflow):
#   webs-alots-ai needs: ANTHROPIC_API_KEY, E2B_API_KEY,
#                        NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#   webs-alots already has its own runtime secrets configured.
#
# All third-party Actions are pinned to a full 40-char commit SHA per
# CICD-01 / AUDIT-16. Bumping a tag-floating reference (e.g. @v3) on a
# compromised action would silently propagate to deployments; pinning to
# a SHA prevents that. The version comment after the SHA is informational.
# =============================================================================

name: Deploy

on:
  push:
    branches: [main, staging]

# Cancel any in-progress deploy for the same branch so a rapid force-push
# does not leave two deployments racing.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

# Least-privilege permissions — deploy only needs to read the repo.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      # CICD-01 / AUDIT-16: Pin GH Actions to SHA for supply-chain hardening.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      # C-04: --ignore-scripts prevents malicious postinstall on CI.
      # The project's legitimate postinstall (patch-opennext.mjs) is
      # invoked explicitly in build:cf.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # build:cf = patch-opennext.mjs → opennextjs-cloudflare build → post-build-patch.mjs
      - name: Build for Cloudflare Workers
        run: npm run build:cf
        env:
          # Supabase URL/key are baked into the client bundle at build time.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Feature flag: show AI Agents / AI Team / Website Builder in super-admin.
          # Baked into client bundle at build time (NEXT_PUBLIC_*).
          NEXT_PUBLIC_AI_FEATURES_ENABLED: ${{ secrets.NEXT_PUBLIC_AI_FEATURES_ENABLED }}
          # Audit 2026-06-09 Task 2 (P0): PHI masking level for client
          # components. getMaskLevel() in src/lib/mask.ts defaults to "none"
          # when this is absent, and NEXT_PUBLIC_* values are inlined at
          # BUILD time — the runtime var in wrangler.toml does not reach
          # client bundles. Without this line, production client components
          # ship with masking compiled to "none" while the env.ts startup
          # health check (which reads the runtime var) passes silently.
          # Both production and staging use "partial" (matches wrangler.toml
          # [env.*.vars] and .env.example). The post-deploy smoke test
          # asserts this value made it into the shipped bundle.
          NEXT_PUBLIC_DATA_MASKING: partial

      # Fail fast if the build silently produced no worker entry point.
      - name: Verify build output
        run: |
          if [ ! -f .open-next/worker.js ]; then
            echo "::error::.open-next/worker.js is missing — build may have silently failed."
            exit 1
          fi
          echo "Worker entry: .open-next/worker.js ($(stat -c%s .open-next/worker.js 2>/dev/null || stat -f%z .open-next/worker.js) bytes)"

      - name: Deploy main Worker (webs-alots) to Cloudflare
        # CICD-01 / AUDIT-16: pinned to v3.15.0 SHA for supply-chain hardening.
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        env:
          # CF-DEPLOY-01: When wrangler detects an OpenNext project it
          # delegates to `opennextjs-cloudflare deploy`, which spawns its
          # OWN wrangler subprocess. The `apiToken:` / `accountId:` inputs
          # are only propagated to the immediate wrangler invocation —
          # the grand-child wrangler started by opennextjs-cloudflare does
          # not see them and aborts with
          #   "it's necessary to set a CLOUDFLARE_API_TOKEN environment
          #    variable for wrangler to work".
          # Setting them at the step `env:` level puts them in the runner
          # process.env so every spawned process inherits them.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy to `production` on main, `staging` on the staging branch.
          command: deploy --env ${{ github.ref_name == 'main' && 'production' || 'staging' }}

      # Post-deploy smoke test against the LIVE site. Catches a broken deploy
      # (e.g. signup failing because Supabase creds were not inlined into the
      # client bundle) within ~30s instead of waiting for a user report.
      # Cloudflare global edge propagation can take >15s after `wrangler deploy`,
      # so retry with backoff: a deploy that actually succeeded should not show
      # red just because the first probe hit a not-yet-updated edge. Fails only
      # if signup is still broken after the full propagation window (~120s).
      - name: Post-deploy smoke test
        env:
          SMOKE_BASE_URL: ${{ github.ref_name == 'main' && 'https://oltigo.com' || 'https://staging.oltigo.com' }}
        run: |
          for attempt in $(seq 1 8); do
            sleep 15
            if node scripts/smoke-post-deploy.mjs; then
              echo "smoke passed on attempt $attempt"
              exit 0
            fi
            echo "smoke attempt $attempt/8 failed; waiting for edge propagation..."
          done
          echo "smoke still failing after ~120s of edge-propagation retries"
          exit 1

      # ─── Second Worker: webs-alots-ai (AI routes) ─────────────────────
      # Lives in workers/ai/ as a separate npm package. Plain fetch handler
      # (no Next.js / OpenNext) so the bundle stays small. Holds CopilotKit
      # runtime + Anthropic SDK + ai SDK + @e2b SDK so the main Worker stays
      # under Cloudflare's 10 MiB Workers Paid script size limit.
      #
      # See workers/ai/README.md for architecture rationale.
      - name: Install AI Worker dependencies
        working-directory: workers/ai
        # C-04: --ignore-scripts to prevent malicious postinstall on CI.
        run: npm ci --ignore-scripts

      - name: Deploy AI Worker (webs-alots-ai) to Cloudflare
        # CICD-01 / AUDIT-16: pinned to v3.15.0 SHA for supply-chain hardening.
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/ai
          # Deploy to `production` on main, `staging` on the staging branch.
          # webs-alots-ai runtime secrets (ANTHROPIC_API_KEY, E2B_API_KEY,
          # NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY) are
          # configured directly on the Worker via `wrangler secret put` —
          # not pushed by this workflow to avoid putting them in GH Actions.
          command: deploy --env ${{ github.ref_name == 'main' && 'production' || 'staging' }}
