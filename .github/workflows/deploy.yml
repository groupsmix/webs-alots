# ═══════════════════════════════════════════════════════════════════════════════# AUTO-DEPLOY TO CLOUDFLARE WORKERS## This workflow automatically deploys your site when you push to main.# It also automatically creates the R2 bucket and KV namespace if they don't exist.## TO DEPLOY:# 1. Push code to main branch → Auto deploys!# 2. Or go to GitHub → Actions → "Deploy to Cloudflare" → Run workflow## SETUP REQUIRED (one-time):# Go to GitHub repo → Settings → Secrets and variables → Actions# Add these secrets:#   - CLOUDFLARE_API_TOKEN (from Cloudflare dashboard)#   - CLOUDFLARE_ACCOUNT_ID (from Cloudflare dashboard)#   - NEXT_PUBLIC_SUPABASE_URL (from Supabase dashboard)#   - NEXT_PUBLIC_SUPABASE_ANON_KEY (from Supabase dashboard)#   - SUPABASE_SERVICE_ROLE_KEY (from Supabase dashboard)#   - JWT_SECRET (generate: openssl rand -hex 64)#   - CRON_SECRET (generate: openssl rand -hex 32)# ═══════════════════════════════════════════════════════════════════════════════name: 🚀 Deploy to Cloudflareon:  push:    branches: [main]  workflow_dispatch:env:  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}  SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}  JWT_SECRET: ${{ secrets.JWT_SECRET }}  CRON_SECRET: ${{ secrets.CRON_SECRET }}  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}  CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}  COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}  CJ_API_KEY: ${{ secrets.CJ_API_KEY }}  CJ_PUBLISHER_ID: ${{ secrets.CJ_PUBLISHER_ID }}  PARTNERSTACK_API_KEY: ${{ secrets.PARTNERSTACK_API_KEY }}  ADMITAD_API_KEY: ${{ secrets.ADMITAD_API_KEY }}  ADMITAD_PUBLISHER_ID: ${{ secrets.ADMITAD_PUBLISHER_ID }}jobs:  deploy:    runs-on: ubuntu-latest    permissions:      contents: read      deployments: write    steps:      - uses: actions/checkout@v4      - name: Setup Node.js        uses: actions/setup-node@v4        with:          node-version: 22          cache: npm      - run: npm install      # ── Install psql for direct DB migration ─────────────────────────────────      - name: Install psql and apply database migrations        run: |          echo "🔄 Installing psql..."          sudo apt-get update          sudo apt-get install -y postgresql-client          echo "🔄 Applying database schema..."          if [ -z "${SUPABASE_DB_URL}" ]; then            echo "Missing SUPABASE_DB_URL secret"            exit 1          fi          for file in $(ls supabase/migrations/*.sql | sort); do            echo "Applying migration: $file"            psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -f "$file"          done      - name: Bootstrap admin user (optional)        run: |          if [ -z "${ADMIN_BOOTSTRAP_EMAIL}" ] || [ -z "${ADMIN_BOOTSTRAP_PASSWORD}" ]; then            echo "No admin bootstrap secrets set, skipping"            exit 0          fi          ADMIN_HASH=$(node - <<'NODE'          const bcrypt = require("bcryptjs");          const email = process.env.ADMIN_BOOTSTRAP_EMAIL;          const password = process.env.ADMIN_BOOTSTRAP_PASSWORD;          if (!email || !password) process.exit(1);          bcrypt.hash(password, 12).then((hash) => {            process.stdout.write(hash);          });NODE          )          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -c "INSERT INTO admin_users (email, password_hash, name, role, is_active) VALUES (lower('${ADMIN_BOOTSTRAP_EMAIL}'), '${ADMIN_HASH}', '${ADMIN_BOOTSTRAP_NAME:-Admin}', '${ADMIN_BOOTSTRAP_ROLE:-super_admin}', true) ON CONFLICT (email) DO UPDATE SET password_hash = EXCLUDED.password_hash, name = EXCLUDED.name, role = EXCLUDED.role, is_active = true;"        env:          ADMIN_BOOTSTRAP_EMAIL: ${{ secrets.ADMIN_BOOTSTRAP_EMAIL }}          ADMIN_BOOTSTRAP_PASSWORD: ${{ secrets.ADMIN_BOOTSTRAP_PASSWORD }}          ADMIN_BOOTSTRAP_NAME: ${{ secrets.ADMIN_BOOTSTRAP_NAME }}          ADMIN_BOOTSTRAP_ROLE: ${{ secrets.ADMIN_BOOTSTRAP_ROLE }}      # ── Create R2 bucket if not exists ──────────────────────────────      - name: Create R2 bucket (if not exists)        run: |          echo "🔧 Checking R2 bucket..."          npx wrangler r2 bucket create next-inc-cache 2>&1 || echo "Bucket may already exist, continuing..."      # ── Create KV namespace if not exists ────────────────────────────      - name: Create KV namespace (if not exists)        run: |          echo "🔧 Checking KV namespace..."          KV_ID=$(npx wrangler kv:namespace list --json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const a=JSON.parse(d);const x=a.find(n=>n.title==='RATE_LIMIT_KV');process.stdout.write(x?x.id:'')}catch{}})")          if [ -z "$KV_ID" ]; then            KV_ID=$(npx wrangler kv:namespace create RATE_LIMIT_KV --json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{try{const o=JSON.parse(d);process.stdout.write(o.id||'')}catch{}})")          fi          if [ -z "$KV_ID" ]; then            echo "Failed to resolve/create KV namespace"            exit 1          fi          export KV_ID          python - <<'PY'          import os, re, pathlib          kv_id = os.environ["KV_ID"]          p = pathlib.Path("wrangler.jsonc")          t = p.read_text(encoding="utf-8")          pat = r'(\"binding\"\s*:\s*\"RATE_LIMIT_KV\"\s*,\s*\"id\"\s*:\s*\")[^\"]+(\"\s*)'          nt, n = re.subn(pat, r'\g<1>' + kv_id + r'\2', t, flags=re.S)          if n == 0:            raise SystemExit("Failed to update RATE_LIMIT_KV id in wrangler.jsonc")          p.write_text(nt, encoding="utf-8")PY      # ── Build OpenNext bundle ─────────────────────────────────────────      - name: Build OpenNext bundle        run: npx @opennextjs/cloudflare build      # ── Deploy to Cloudflare ──────────────────────────────────────────      - name: Deploy to Cloudflare        run: npx opennextjs-cloudflare deploy      # ── Set Worker secrets ────────────────────────────────────────────      - name: Set Worker secrets        run: |          echo "${{ secrets.CRON_SECRET }}" | npx wrangler secret put CRON_SECRET --name affilite-mix 2>&1 || true          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET --name affilite-mix 2>&1 || true          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --name affilite-mix 2>&1 || true          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" | npx wrangler secret put NEXT_PUBLIC_SUPABASE_URL --name affilite-mix 2>&1 || true          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" | npx wrangler secret put NEXT_PUBLIC_SUPABASE_ANON_KEY --name affilite-mix 2>&1 || true      # ── Verify deployment ─────────────────────────────────────────────      - name: Verify deployment        run: |          echo "✅ Deployment complete!"          echo "🌐 Testing site..."          sleep 5          curl -s -o /dev/null -w "HTTP %{http_code}" --max-time 10 https://wristnerd.xyz/ || echo "Site may need DNS propagation"
