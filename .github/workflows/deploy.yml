# =============================================================================
# Deploy — Cloudflare Workers production / staging deploy
# =============================================================================
#
# Triggers on push to `main` (→ production) or `staging` (→ staging).
# Deploys TWO Workers from the same workflow run:
#
#   1. webs-alots     — main Next.js app (built via OpenNext)
#   2. webs-alots-ai  — AI route Worker (plain fetch handler in workers/ai/)
#
# See workers/ai/README.md for why the split exists.
#
# Required GitHub secrets:
#   CLOUDFLARE_API_TOKEN   — scoped to Workers Scripts:Edit on BOTH scripts,
#                            Account Settings:Read, Workers KV Storage:Edit,
#                            Workers Routes:Edit on the oltigo.com zone
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID (not a secret, but kept
#                            out of wrangler.toml to avoid leaking it in forks)
#
# Required Cloudflare Worker secrets (set ONCE per worker via
# `wrangler secret put`, or via the dashboard — NOT pushed by this workflow):
#   webs-alots-ai needs: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#                        (super_admin auth) plus AT LEAST ONE AI provider config —
#                        either OPENAI_API_KEY (+ optional OPENAI_BASE_URL /
#                        OPENAI_MODEL) or ANTHROPIC_API_KEY.
#                        Helper: scripts/setup-ai-worker-secrets.sh
#   webs-alots already has its own runtime secrets configured.
#                        Helper: scripts/setup-worker-secrets.sh
#
# All third-party Actions are pinned to a full 40-char commit SHA per
# CICD-01 / AUDIT-16. Bumping a tag-floating reference (e.g. @v3) on a
# compromised action would silently propagate to deployments; pinning to
# a SHA prevents that. The version comment after the SHA is informational.
# =============================================================================

name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

# Cancel any in-progress deploy for the same branch so a rapid force-push
# does not leave two deployments racing.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

# Least-privilege permissions — deploy only needs to read the repo.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    # GitHub Deployment environment. Selected by branch (main→production,
    # otherwise staging). This records each deploy under the environment and,
    # IF you add protection rules in GitHub → Settings → Environments
    # (e.g. "Required reviewers" on `production`), pauses the run for manual
    # approval before it deploys. With no rules configured it is a no-op, so
    # adding this does not change current behaviour until you opt in.
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://oltigo.com' || 'https://staging.oltigo.com' }}
    steps:
      # CICD-01 / AUDIT-16: Pin GH Actions to SHA for supply-chain hardening.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Match .nvmrc (22.13.0), ci.yml, and package.json engines (>=22.13)
          # so deploy validates on the same Node minor that CI tested against.
          node-version: "22.13"
          cache: npm

      # C-04: --ignore-scripts prevents malicious postinstall on CI.
      # The project's legitimate postinstall (patch-opennext.mjs) is
      # invoked explicitly in build:cf.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # build:cf = patch-opennext.mjs → opennextjs-cloudflare build → post-build-patch.mjs
      - name: Build for Cloudflare Workers
        run: npm run build:cf
        env:
          # Supabase URL/key are baked into the client bundle at build time.
          # Per-branch credentials: staging must NOT ship with the production
          # Supabase project baked into its client bundle (cross-env PHI risk).
          # `main` uses NEXT_PUBLIC_SUPABASE_*; `staging` (and any other branch)
          # uses STAGING_SUPABASE_*. Both pairs must be set in repo secrets.
          NEXT_PUBLIC_SUPABASE_URL: ${{ github.ref_name == 'main' && secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ github.ref_name == 'main' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.STAGING_SUPABASE_ANON_KEY }}
          # Audit 2026-06-09 Task 2 (P0): PHI masking level for client
          # components. getMaskLevel() in src/lib/mask.ts now defaults to
          # "partial" (fail-safe), but NEXT_PUBLIC_* values are inlined at
          # BUILD time and the runtime var in wrangler.toml does not reach
          # client bundles — so we still set it explicitly here to pin the
          # exact deployed value and let the post-deploy smoke test assert it
          # made it into the shipped bundle.
          # Both production and staging use "partial" (matches wrangler.toml
          # [env.*.vars] and .env.example).
          NEXT_PUBLIC_DATA_MASKING: partial
          # BG2 / Ops dashboard "Last Deployment": pin a deterministic build
          # timestamp instead of letting next.config.ts fall back to
          # `new Date()` (which makes every build non-reproducible and churns
          # the Worker bundle). Use the pushed commit's timestamp so rebuilding
          # the same commit yields an identical value; fall back to the run
          # start time for workflow_dispatch runs with no head_commit.
          NEXT_PUBLIC_DEPLOY_TIME: ${{ github.event.head_commit.timestamp || github.run_started_at }}

      # Fail fast if the build silently produced no generated OpenNext fetch bundle.
      - name: Verify build output
        run: |
          if [ ! -f .open-next/worker.js ]; then
            echo "::error::.open-next/worker.js is missing — build may have silently failed."
            exit 1
          fi
          echo "Generated OpenNext bundle: .open-next/worker.js ($(stat -c%s .open-next/worker.js 2>/dev/null || stat -f%z .open-next/worker.js) bytes)"

      - name: Deploy main Worker (webs-alots) to Cloudflare
        # CICD-01 / AUDIT-16: pinned to v3.15.0 SHA for supply-chain hardening.
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        env:
          # CF-DEPLOY-01: When wrangler detects an OpenNext project it
          # delegates to `opennextjs-cloudflare deploy`, which spawns its
          # OWN wrangler subprocess. The `apiToken:` / `accountId:` inputs
          # are only propagated to the immediate wrangler invocation —
          # the grand-child wrangler started by opennextjs-cloudflare does
          # not see them and aborts with
          #   "it's necessary to set a CLOUDFLARE_API_TOKEN environment
          #    variable for wrangler to work".
          # Setting them at the step `env:` level puts them in the runner
          # process.env so every spawned process inherits them.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy to `production` on main, `staging` on the staging branch.
          command: deploy --env ${{ github.ref_name == 'main' && 'production' || 'staging' }}

      # Post-deploy smoke test against the LIVE site. Catches a broken deploy
      # (e.g. signup failing because Supabase creds were not inlined into the
      # client bundle) within ~30s instead of waiting for a user report.
      # Cloudflare global edge propagation can take >15s after `wrangler deploy`,
      # so retry with backoff: a deploy that actually succeeded should not show
      # red just because the first probe hit a not-yet-updated edge. Fails only
      # if signup is still broken after the full propagation window (~120s).
      - name: Post-deploy smoke test
        env:
          SMOKE_BASE_URL: ${{ github.ref_name == 'main' && 'https://oltigo.com' || 'https://staging.oltigo.com' }}
          # Optional authenticated AI smoke. Leave unset to skip.
          # Recommended target: /api/ai/manager with a clinic_admin session cookie.
          SMOKE_AI_PATH: ${{ vars.SMOKE_AI_PATH }}
          SMOKE_AI_METHOD: ${{ vars.SMOKE_AI_METHOD }}
          SMOKE_AI_BODY: ${{ vars.SMOKE_AI_BODY }}
          SMOKE_AI_EXPECT_STATUS: ${{ vars.SMOKE_AI_EXPECT_STATUS }}
          SMOKE_AI_COOKIE: ${{ github.ref_name == 'main' && secrets.SMOKE_AI_COOKIE_PROD || secrets.SMOKE_AI_COOKIE_STAGING }}
          SMOKE_AI_AUTH_HEADER: ${{ github.ref_name == 'main' && secrets.SMOKE_AI_AUTH_HEADER_PROD || secrets.SMOKE_AI_AUTH_HEADER_STAGING }}
        run: |
          for attempt in $(seq 1 8); do
            sleep 15
            if node scripts/smoke-post-deploy.mjs; then
              echo "smoke passed on attempt $attempt"
              exit 0
            fi
            echo "smoke attempt $attempt/8 failed; waiting for edge propagation..."
          done
          echo "smoke still failing after ~120s of edge-propagation retries"
          exit 1

      # ─── Second Worker: webs-alots-ai (AI routes) ─────────────────────
      # Lives in workers/ai/ as a separate npm package. Plain fetch handler
      # (no Next.js / OpenNext) so the bundle stays small. Holds the CopilotKit
      # runtime + the OpenAI / Anthropic clients so the main Worker stays
      # under Cloudflare's 10 MiB Workers Paid script size limit.
      #
      # See workers/ai/README.md for architecture rationale.
      - name: Install AI Worker dependencies
        working-directory: workers/ai
        # C-04: --ignore-scripts to prevent malicious postinstall on CI.
        run: npm ci --ignore-scripts

      - name: Deploy AI Worker (webs-alots-ai) to Cloudflare
        # CICD-01 / AUDIT-16: pinned to v3.15.0 SHA for supply-chain hardening.
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/ai
          # Deploy to `production` on main, `staging` on the staging branch.
          # webs-alots-ai runtime secrets (NEXT_PUBLIC_SUPABASE_URL,
          # NEXT_PUBLIC_SUPABASE_ANON_KEY and one AI provider config —
          # OPENAI_API_KEY [+ OPENAI_BASE_URL/OPENAI_MODEL] or ANTHROPIC_API_KEY)
          # are configured directly on the Worker via `wrangler secret put`
          # (scripts/setup-ai-worker-secrets.sh) — not pushed by this workflow
          # to avoid putting them in GH Actions.
          command: deploy --env ${{ github.ref_name == 'main' && 'production' || 'staging' }}
