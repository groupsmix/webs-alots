# ═══════════════════════════════════════════════════════════════════════════════
# AUTO-DEPLOY TO CLOUDFLARE WORKERS
#
# This workflow automatically deploys your site when you push to main.
# It also automatically creates the R2 bucket and KV namespace if they don't exist.
#
# TO DEPLOY:
# 1. Push code to main branch → Auto deploys!
# 2. Or go to GitHub → Actions → "Deploy to Cloudflare" → Run workflow
#
# SETUP REQUIRED (one-time):
# Go to GitHub repo → Settings → Secrets and variables → Actions
# Add these secrets:
#   - CLOUDFLARE_API_TOKEN (from Cloudflare dashboard)
#   - CLOUDFLARE_ACCOUNT_ID (from Cloudflare dashboard)
#   - NEXT_PUBLIC_SUPABASE_URL (from Supabase dashboard)
#   - NEXT_PUBLIC_SUPABASE_ANON_KEY (from Supabase dashboard)
#   - SUPABASE_SERVICE_ROLE_KEY (from Supabase dashboard)
#   - JWT_SECRET (generate: openssl rand -hex 64)
#   - CRON_SECRET (generate: openssl rand -hex 32)
# ═══════════════════════════════════════════════════════════════════════════════

name: 🚀 Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  CLOUDFLARE_AI_API_TOKEN: ${{ secrets.CLOUDFLARE_AI_API_TOKEN }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
  CJ_API_KEY: ${{ secrets.CJ_API_KEY }}
  CJ_PUBLISHER_ID: ${{ secrets.CJ_PUBLISHER_ID }}
  PARTNERSTACK_API_KEY: ${{ secrets.PARTNERSTACK_API_KEY }}
  ADMITAD_API_KEY: ${{ secrets.ADMITAD_API_KEY }}
  ADMITAD_PUBLISHER_ID: ${{ secrets.ADMITAD_PUBLISHER_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      # ── Create R2 bucket if not exists ──────────────────────────────
      - name: Create R2 bucket (if not exists)
        run: |
          echo "🔧 Checking R2 bucket..."
          npx wrangler r2 bucket create next-inc-cache 2>&1 || echo "Bucket may already exist, continuing..."

      # ── Create KV namespace if not exists ────────────────────────────
      - name: Create KV namespace (if not exists)
        run: |
          echo "🔧 Checking KV namespace..."
          KV_ID=$(npx wrangler kv:namespace create RATE_LIMIT_KV 2>&1 | grep -o '"id":"[^"]*"' | cut -d'"' -f4 || echo "")
          if [ -n "$KV_ID" ]; then
            echo "Created KV namespace: $KV_ID"
          else
            echo "KV namespace may already exist, continuing..."
          fi

      # ── Build OpenNext bundle ─────────────────────────────────────────
      - name: Build OpenNext bundle
        run: npx @opennextjs/cloudflare build

      # ── Deploy to Cloudflare ──────────────────────────────────────────
      - name: Deploy to Cloudflare
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Set Worker secrets ────────────────────────────────────────────
      - name: Set Worker secrets
        run: |
          echo "${{ secrets.CRON_SECRET }}" | npx wrangler secret put CRON_SECRET --name affilite-mix 2>&1 || true
          echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET --name affilite-mix 2>&1 || true
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --name affilite-mix 2>&1 || true
          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" | npx wrangler secret put NEXT_PUBLIC_SUPABASE_URL --name affilite-mix 2>&1 || true
          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" | npx wrangler secret put NEXT_PUBLIC_SUPABASE_ANON_KEY --name affilite-mix 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Verify deployment ─────────────────────────────────────────────
      - name: Verify deployment
        run: |
          echo "✅ Deployment complete!"
          echo "🌐 Testing site..."
          sleep 5
          curl -s -o /dev/null -w "HTTP %{http_code}" --max-time 10 https://wristnerd.xyz/ || echo "Site may need DNS propagation"
