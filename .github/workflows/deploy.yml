name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - staging

# Least-privilege permissions — deploy only needs to read repo contents
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Check
    steps:
      - name: Checkout
        # F-19: Pin to SHA for supply-chain hardening
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm config set ignore-scripts true
          npm ci
          node scripts/patch-opennext.mjs || true

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    name: Build & Deploy
    environment: ${{ github.ref_name == 'staging' && 'staging' || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm config set ignore-scripts true
          npm ci
          node scripts/patch-opennext.mjs || true

      - name: Build for Cloudflare
        run: |
          bash scripts/pre-deploy-check.sh
          npm run build:cf
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ github.ref_name == 'staging' && secrets.STAGING_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ github.ref_name == 'staging' && secrets.STAGING_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}

      - name: Deploy to Cloudflare Workers (Production)
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@da0e0e6f1e51ed4b0a8cc9eb1c0a3f0e3e3e9d1c # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (Staging)
        if: github.ref_name == 'staging'
        uses: cloudflare/wrangler-action@da0e0e6f1e51ed4b0a8cc9eb1c0a3f0e3e3e9d1c # v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging

      # Audit 8.6 — Post-deploy health check to verify the deployment is live
      - name: Health Check
        run: |
          SITE_URL="${{ github.ref_name == 'staging' && 'https://staging.oltigo.com' || 'https://oltigo.com' }}"
          echo "Running health check against ${SITE_URL}..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "${SITE_URL}" || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Health check passed (HTTP ${STATUS})"
              exit 0
            fi
            echo "Attempt ${i}: HTTP ${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "Health check FAILED after 5 attempts"
          exit 1
