name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  SUPABASE_SERVICE_ROLE_KEY: placeholder
  JWT_SECRET: ci-test-secret
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
  TURNSTILE_SECRET_KEY: ""

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # Non-blocking: this repo deploys to Cloudflare Workers via @opennextjs/cloudflare,
    # and `next start` does not fully serve the middleware/edge routes, so audits 404.
    # Kept green until we switch the collect step to `opennextjs-cloudflare preview`
    # or run against the deployed preview URL.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
