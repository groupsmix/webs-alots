name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  SUPABASE_SERVICE_ROLE_KEY: placeholder
  JWT_SECRET: ci-test-secret
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
  TURNSTILE_SECRET_KEY: ""

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Run Lighthouse CI (non-blocking bootstrap)
        # `next start` does not fully serve edge/middleware routes for this Cloudflare
        # Workers app, so initial audits 404. Bootstrap non-blocking; switch to
        # `opennextjs-cloudflare preview` or the live preview URL to enforce budgets.
        run: npx @lhci/cli autorun || echo "LHCI failures allowed during bootstrap"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
