name: Monthly Database Restore Drill

on:
  # INF-001: Re-enabled monthly restore drill. Validates backup integrity.
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch:

# Least-privilege permissions
permissions:
  contents: read

jobs:
  restore-drill:
    runs-on: ubuntu-latest
    name: Restore Backup to Scratch DB
    steps:
      # AUDIT-16: Pin GH Actions to SHA for supply-chain hardening
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch Latest Encrypted Backup
        # F-03: Aligned to use R2_BACKUP_BUCKET (same as backup.yml) and
        # search the backups/daily/ prefix where nightly backups are stored.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          R2_BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          R2_ENDPOINT="https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Look in backups/daily/ first (matches backup.yml upload path),
          # then fall back to backups/weekly/ and backups/monthly/.
          LATEST=""
          for PREFIX in daily weekly monthly; do
            LATEST=$(aws s3 ls "s3://${R2_BACKUP_BUCKET}/backups/${PREFIX}/" \
              --endpoint-url "${R2_ENDPOINT}" 2>/dev/null \
              | sort -r | head -1 | awk '{print $4}' || true)
            if [ -n "${LATEST}" ]; then
              LATEST_PATH="backups/${PREFIX}/${LATEST}"
              break
            fi
          done

          if [ -z "${LATEST}" ]; then
            echo "::error::No backups found in R2 bucket."
            exit 1
          fi

          echo "Downloading: ${LATEST_PATH}"
          aws s3 cp "s3://${R2_BACKUP_BUCKET}/${LATEST_PATH}" latest_backup.sql.gz.gpg \
            --endpoint-url "${R2_ENDPOINT}"

      - name: Decrypt and Decompress Backup
        env:
          BACKUP_GPG_PRIVATE_KEY: ${{ secrets.BACKUP_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$BACKUP_GPG_PRIVATE_KEY" ]; then
            echo "::error::BACKUP_GPG_PRIVATE_KEY secret is not set. Cannot decrypt backup."
            exit 1
          fi

          # Import the private key to decrypt the backup
          echo "$BACKUP_GPG_PRIVATE_KEY" | gpg --import --batch --yes

          gpg --decrypt --batch --yes latest_backup.sql.gz.gpg > latest_backup.sql.gz
          gunzip latest_backup.sql.gz

      - name: Spin up local Supabase
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.101.0

      - name: Start Supabase Stack
        run: supabase start

      - name: Restore Backup to Local DB
        run: |
          # Supabase local dev stack exposes Postgres on port 54322 (not 5432)
          psql -h localhost -p 54322 -U postgres -d postgres -f latest_backup.sql
        env:
          PGPASSWORD: postgres

      - name: Run Smoke Query
        run: |
          # Verify that the clinics table exists and has rows
          COUNT=$(psql -h localhost -p 54322 -U postgres -d postgres -t -c "SELECT count(*) FROM clinics;")
          echo "Clinics count: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::warning::Restore succeeded, but clinics table is empty. This may be expected if the production DB is new."
          else
            echo "Smoke query passed. $COUNT clinics restored successfully."
          fi
        env:
          PGPASSWORD: postgres

      - name: Teardown
        if: always()
        run: supabase stop
