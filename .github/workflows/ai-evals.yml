name: AI Evaluations
on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/app/api/v1/ai/**'
      - 'src/lib/ai/**'
      - 'evals/**'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Start Background Server for Testing
        run: |
          npm run build
          npm start &
          # Wait for server to be ready
          npx wait-on http://localhost:3000/api/docs -t 30000
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run AI Evaluations
        run: npm run eval:ai
        env:
          API_BASE_URL: http://localhost:3000
          EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}

      - name: Upload Evaluation Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-eval-results
          path: evals/results/
          
      - name: Check for Regressions
        if: always()
        run: npx tsx evals/utils/regression-detector.ts
