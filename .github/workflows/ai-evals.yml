name: AI Evaluations
on:
  schedule:
    - cron: "0 2 * * *" # 2 AM UTC daily
  workflow_dispatch:
  pull_request:
    paths:
      - "src/app/api/v1/ai/**"
      - "src/lib/ai/**"
      - "evals/**"

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Preflight — check required secrets
        id: preflight
        env:
          TEST_DATABASE_URL:  ${{ secrets.TEST_DATABASE_URL }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          EVAL_AUTH_TOKEN:    ${{ secrets.EVAL_AUTH_TOKEN }}
        run: |
          ok=true
          [ -z "$TEST_DATABASE_URL" ] && echo "::warning::TEST_DATABASE_URL not set — skipping evals" && ok=false
          [ -z "$OPENAI_API_KEY" ]    && echo "::warning::OPENAI_API_KEY not set — skipping evals"    && ok=false
          [ -z "$EVAL_AUTH_TOKEN" ]   && echo "::warning::EVAL_AUTH_TOKEN not set — skipping evals"   && ok=false
          echo "secrets_ok=$ok" >> "$GITHUB_OUTPUT"
      - name: Start Background Server for Testing
        if: steps.preflight.outputs.secrets_ok == 'true'
        run: |
          npm run build
          npm start &
          # Wait for server to be ready
          npx wait-on http://localhost:3000/api/docs -t 30000
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROFILE_HEADER_HMAC_KEY: ci-e2e-profile-header-hmac-key-placeholder
          R2_SIGNED_URL_SECRET: ci-e2e-r2-signed-url-secret-placeholder
          NEXT_PUBLIC_SENTRY_DSN: https://ci-e2e-sentry-dsn-placeholder@o0.ingest.sentry.io/0
          CRON_SECRET: ci-e2e-cron-secret-placeholder-0123456789
          # F-02: instrumentation.ts refuses to start in production unless
          # SEED_PASSWORDS_ROTATED=true. This is a CI-only placeholder —
          # no real seed accounts exist in the test database.
          SEED_PASSWORDS_ROTATED: "true"
          SEED_USERS_DELETED: "true"
      - name: Run AI Evaluations
        if: steps.preflight.outputs.secrets_ok == 'true'
        run: npm run eval:ai
        env:
          API_BASE_URL: http://localhost:3000
          EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}

      - name: Upload Evaluation Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-eval-results
          path: evals/results/

      - name: Check for Regressions
        if: always()
        run: npx tsx evals/utils/regression-detector.ts
