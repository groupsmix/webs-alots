name: AI Evaluations (Nightly)

on:
  schedule:
    # F-AI-03: Run nightly at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    name: AI Eval Suite
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm config set ignore-scripts true
          npm ci

      - name: Run hallucination evals
        continue-on-error: true
        env:
          EVAL_BASE_URL: ${{ secrets.EVAL_BASE_URL || 'https://oltigo.com' }}
          EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx evals/hallucination.eval.ts

      - name: Run jailbreak evals
        continue-on-error: true
        env:
          EVAL_BASE_URL: ${{ secrets.EVAL_BASE_URL || 'https://oltigo.com' }}
          EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx evals/jailbreak.eval.ts

      - name: Run bias evals
        continue-on-error: true
        env:
          EVAL_BASE_URL: ${{ secrets.EVAL_BASE_URL || 'https://oltigo.com' }}
          EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx evals/bias.eval.ts

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-eval-results-${{ github.run_id }}
          path: evals/results/
          retention-days: 90
