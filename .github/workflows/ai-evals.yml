name: AI Evaluations
on:
  schedule:
    - cron: "0 2 * * *" # 2 AM UTC daily
  workflow_dispatch:
  pull_request:
    paths:
      - "src/app/api/v1/ai/**"
      - "src/lib/ai/**"
      - "evals/**"

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Pin to the repository's supported runtime (package.json engines
          # requires >=22.13; .nvmrc is the single source of truth). The
          # previous hardcoded "20" contradicted the engine requirement and
          # the Next 16 / React 19 stack.
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # The deterministic, offline suites (drug-interaction, triage, tool-loop)
      # import the real production modules and need NO secrets and NO running
      # server. They must gate every PR — that is the substance of this check.
      # The RAG suite additionally requires a live, authenticated endpoint and
      # self-skips when EVAL_AUTH_TOKEN is unset, so it is safe to invoke the
      # full runner here unconditionally.
      - name: Typecheck eval harness
        run: npm run typecheck:evals

      # Restore the per-suite pass-rate baselines so the regression detector's
      # "drop from baseline" check is meaningful across runs (baselines are
      # git-ignored, so without this cache every run looked like a first run).
      - name: Restore eval baselines
        uses: actions/cache@v4
        with:
          path: evals/baselines
          key: eval-baselines-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            eval-baselines-${{ github.ref_name }}-
            eval-baselines-

      - name: Preflight — check secrets for the live RAG suite
        id: preflight
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}
        run: |
          ok=true
          [ -z "$TEST_DATABASE_URL" ] && echo "::notice::TEST_DATABASE_URL not set — live RAG suite will be skipped (offline suites still run)" && ok=false
          [ -z "$OPENAI_API_KEY" ]    && echo "::notice::OPENAI_API_KEY not set — live RAG suite will be skipped (offline suites still run)"    && ok=false
          [ -z "$EVAL_AUTH_TOKEN" ]   && echo "::notice::EVAL_AUTH_TOKEN not set — live RAG suite will be skipped (offline suites still run)"   && ok=false
          echo "secrets_ok=$ok" >> "$GITHUB_OUTPUT"

      - name: Start background server for the live RAG suite
        if: steps.preflight.outputs.secrets_ok == 'true'
        run: |
          npm run build
          npm start &
          # Dependency-free readiness probe (replaces `npx wait-on`, which was
          # never declared as a dependency). Poll for up to ~60s.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/docs >/dev/null 2>&1; then
              echo "Server is ready."
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server did not become ready in time"
          exit 1
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROFILE_HEADER_HMAC_KEY: ci-e2e-profile-header-hmac-key-placeholder
          R2_SIGNED_URL_SECRET: ci-e2e-r2-signed-url-secret-placeholder
          NEXT_PUBLIC_SENTRY_DSN: https://ci-e2e-sentry-dsn-placeholder@o0.ingest.sentry.io/0
          CRON_SECRET: ci-e2e-cron-secret-placeholder-0123456789
          # F-02: instrumentation.ts refuses to start in production unless
          # SEED_PASSWORDS_ROTATED=true. This is a CI-only placeholder —
          # no real seed accounts exist in the test database.
          SEED_PASSWORDS_ROTATED: "true"
          SEED_USERS_DELETED: "true"

      # Always run the full suite. Offline suites gate the PR; the RAG suite
      # runs only when a server + token are present (otherwise it self-skips
      # and is excluded from totals). EVAL_AUTH_TOKEN is passed through empty
      # when the secret is absent, which triggers the runner's graceful skip.
      - name: Run AI Evaluations
        run: npm run eval:ai
        env:
          API_BASE_URL: http://localhost:3000
          EVAL_AUTH_TOKEN: ${{ secrets.EVAL_AUTH_TOKEN }}

      - name: Upload Evaluation Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-eval-results
          path: evals/results/

      - name: Check for Regressions
        if: always()
        run: npx tsx evals/utils/regression-detector.ts
