name: Terraform

on:
  pull_request:
    branches: [main, staging]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main, staging]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

# Least-privilege permissions
permissions:
  contents: read

concurrency:
  group: terraform-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    name: Terraform fmt and validate
    steps:
      # Pin GH Actions to full SHA for supply-chain hardening.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Use the pinned setup-terraform release so CI can run fmt/init/validate.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -diff -recursive infra

      # Guard against committed/local Terraform state. Local state is
      # unacceptable for this configuration (PHI-adjacent resources, no
      # locking). Any *.tfstate* artifact in infra/ means state escaped the
      # remote backend, so fail hard. This catches committed/leftover local
      # state; it does NOT prove a remote backend is configured (CI only runs
      # validate with -backend=false and never applies). Apply remains gated by
      # the documented backend.tf setup + review, not by this check alone.
      - name: Guard against committed local state
        working-directory: infra
        run: |
          set -euo pipefail
          state_files="$(find . -name 'terraform.tfstate' -o -name 'terraform.tfstate.backup' -o -name '*.tfstate' 2>/dev/null || true)"
          if [ -n "${state_files}" ]; then
            echo "ERROR: Terraform state file(s) found in infra/:"
            echo "${state_files}"
            echo "Local/committed state is not permitted for this configuration."
            echo "Configure the remote backend in backend.tf and remove local state."
            exit 1
          fi
          if grep -Eq '^[[:space:]]*backend[[:space:]]+"|^[[:space:]]*cloud[[:space:]]*\{' backend.tf; then
            echo "Remote backend block is uncommented in backend.tf."
          else
            echo "NOTICE: No active remote backend block in backend.tf."
            echo "        'terraform apply' is intentionally blocked until one is configured."
          fi
          echo "Local-state guard passed."

      # Pre-download the Cloudflare provider from GitHub Releases to avoid
      # intermittent 502s from registry.terraform.io. The binary is fetched
      # directly and placed in a local filesystem mirror so that
      # `terraform init -plugin-dir` never touches the registry.
      #
      # Supply-chain hardening: download the SHA256SUMS file from the same
      # release, then verify the zip's SHA256 against it before unzipping.
      # Even though `terraform init -plugin-dir` would catch a tampered binary
      # via the lock-file h1: hashes, verifying before unzip fails faster and
      # makes the supply-chain intent explicit in the pipeline log.
      - name: Download and verify Cloudflare Terraform provider
        run: |
          set -euo pipefail
          # Single source of truth: read the pinned provider version from the
          # committed lock file instead of hardcoding it here. This prevents the
          # workflow, .terraform.lock.hcl, and versions.tf from drifting apart.
          PROVIDER_VERSION="$(sed -n 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' infra/.terraform.lock.hcl | head -n1)"
          if [ -z "${PROVIDER_VERSION}" ]; then
            echo "ERROR: could not read provider version from infra/.terraform.lock.hcl"
            exit 1
          fi
          echo "Pinned Cloudflare provider version (from lock file): ${PROVIDER_VERSION}"
          PLATFORM="linux_amd64"
          BASE_URL="https://github.com/cloudflare/terraform-provider-cloudflare/releases/download/v${PROVIDER_VERSION}"
          ZIP_NAME="terraform-provider-cloudflare_${PROVIDER_VERSION}_${PLATFORM}.zip"
          ZIP_FILE="/tmp/${ZIP_NAME}"
          SUMS_FILE="/tmp/cf-provider-SHA256SUMS"
          PLUGIN_DIR="${HOME}/.terraform.d/plugins/registry.terraform.io/cloudflare/cloudflare/${PROVIDER_VERSION}/${PLATFORM}"

          mkdir -p "${PLUGIN_DIR}"

          # Download the provider zip and the authoritative SHA256SUMS file
          curl -fsSL "${BASE_URL}/${ZIP_NAME}" -o "${ZIP_FILE}"
          curl -fsSL "${BASE_URL}/terraform-provider-cloudflare_${PROVIDER_VERSION}_SHA256SUMS" \
            -o "${SUMS_FILE}"

          # Verify the zip against the checksums file — abort if it does not match
          (cd /tmp && grep "${ZIP_NAME}" "${SUMS_FILE}" | sha256sum --check --strict)
          echo "SHA256 verified for ${ZIP_NAME}"

          unzip -j "${ZIP_FILE}" -d "${PLUGIN_DIR}"
          chmod +x "${PLUGIN_DIR}"/terraform-provider-cloudflare_v*
          echo "PLUGIN_DIR=${HOME}/.terraform.d/plugins" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend=false -input=false -plugin-dir "${PLUGIN_DIR}"

      - name: Terraform validate
        working-directory: infra
        run: terraform validate -no-color
