# ═══════════════════════════════════════════════════════════════════════════════
# TERRAFORM PLAN / APPLY
#
# Runs `terraform plan` on PRs and `terraform apply` on merge to main.
# Ensures infrastructure changes go through code review.
#
# Prerequisites:
#   - Set TF_VAR_cloudflare_api_token, TF_VAR_cloudflare_account_id,
#     TF_VAR_zone_id, and TF_VAR_domain as GitHub Secrets.
#   - Optionally configure a remote Terraform backend.
# ═══════════════════════════════════════════════════════════════════════════════
name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
  pull_request:
    paths:
      - "infra/**"

env:
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  TF_VAR_domain: ${{ secrets.CLOUDFLARE_DOMAIN }}

defaults:
  run:
    working-directory: infra/cloudflare

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
      - run: terraform init -input=false
      - run: terraform validate
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true
      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/cloudflare/plan.txt', 'utf8');
            const output = `### Terraform Plan
            \`\`\`
            ${plan.substring(0, 60000)}
            \`\`\`
            *Triggered by @${{ github.actor }} on \`${{ github.event.pull_request.head.ref }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform apply -auto-approve -input=false
