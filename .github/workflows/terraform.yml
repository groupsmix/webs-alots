name: Terraform

on:
  pull_request:
    branches: [main, staging]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main, staging]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

# Least-privilege permissions
permissions:
  contents: read

concurrency:
  group: terraform-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: ubuntu-latest
    name: Terraform fmt and validate
    steps:
      # Pin GH Actions to full SHA for supply-chain hardening.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Use the pinned setup-terraform release so CI can run fmt/init/validate.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.6
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -diff -recursive infra

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate -no-color
