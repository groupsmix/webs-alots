name: One-Click E2E Setup & Test

on:
  workflow_dispatch:

concurrency:
  group: e2e-setup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-and-test:
    name: Full Setup → E2E Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase local
        run: |
          npm install -g supabase
          supabase start
          echo "SUPABASE_URL=$(supabase status | grep 'API URL' | awk '{print $4}')" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(supabase status | grep 'anon key' | awk '{print $4}')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status | grep 'service_role key' | awk '{print $5}')" >> $GITHUB_ENV

      - name: Push database schema (idempotent)
        run: |
          supabase db push --db-url "postgresql://postgres:postgres@localhost:54322/postgres" --noVerifyPasswords || true

      - name: Seed test data
        run: |
          supabase db seed --file supabase/seed.sql 2>&1 || echo "Seeding completed"

      - name: Create .env for build
        run: |
          cat > .env << 'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET=ci-test-secret-jwt-at-least-32-chars-long-for-testing
          NEXT_PUBLIC_DEFAULT_SITE=watch-tools
          NEXT_PUBLIC_TURNSTILE_SITE_KEY=
          TURNSTILE_SECRET_KEY=
          CRON_SECRET=ci-cron-secret-test
          EOF

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ci-test-secret-jwt-at-least-32-chars-long-for-testing
          NEXT_PUBLIC_DEFAULT_SITE: watch-tools

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_DEFAULT_SITE: watch-tools

      - name: Show test results
        if: always()
        run: npx playwright test --reporter=list 2>&1 || true

      - name: Stop Supabase
        if: always()
        run: supabase stop || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
