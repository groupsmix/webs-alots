name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    runs-on: ubuntu-latest
    name: Lint, Type Check & Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test

      - name: Bundle size budget check
        run: |
          npm run build 2>&1 | tee build-output.txt
          # Extract the total First Load JS size from the build output.
          # Next.js prints "First Load JS shared by all  XX.X kB" — we check
          # that the shared JS bundle stays under 250 kB (a generous budget
          # that catches accidental large dependency additions).
          TOTAL_KB=$(grep -oP 'First Load JS shared by all\s+\K[0-9.]+' build-output.txt || echo "0")
          echo "First Load JS shared: ${TOTAL_KB} kB"
          if [ "$(echo "$TOTAL_KB > 250" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
            echo "::error::Bundle size budget exceeded! First Load JS shared = ${TOTAL_KB} kB (limit: 250 kB)"
            exit 1
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    name: E2E Tests (Playwright)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          E2E_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
