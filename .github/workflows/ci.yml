name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  SUPABASE_SERVICE_ROLE_KEY: placeholder
  JWT_SECRET: ci-test-secret
  INTERNAL_API_TOKEN: ci-test-internal-token
  CRON_SECRET: ci-test-cron-secret
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
  TURNSTILE_SECRET_KEY: ""
  NEXT_PUBLIC_DEFAULT_SITE: ai-compared

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Migration policy lint (E-2)
        run: bash scripts/check-migrations.sh
      - run: npm run lint
      - run: npm test
      - run: npm run typecheck:all
      - run: npm run build
        env:
          NEXT_PUBLIC_DEFAULT_SITE: ai-compared
      - name: Bundle size check
        run: npx size-limit
      - name: Wrangler dry-run check (F-035)
        run: npx wrangler deploy --dry-run

  # ── RLS / anon-grant audit against staging DB (E-6) ────────────────
  # Runs the queries from docs/public-rls-inventory.md against the
  # staging database. Fails the build if any unexpected policies or
  # grants have drifted onto the public schema.
  #
  # Gated on the STAGING_SUPABASE_DB_URL repo secret being set; when
  # the secret is missing (e.g. PRs from forks), the script exits 0
  # with a warning so the job stays green while still surfacing the
  # skip in logs.
  db-audit:
    name: RLS audit (E-6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Run db-audit
        env:
          STAGING_SUPABASE_DB_URL: ${{ secrets.STAGING_SUPABASE_DB_URL }}
        run: bash scripts/db-audit.sh

  # ── DB type drift check (E-5) ─────────────────────────────────────
  # Regenerates types/supabase.ts from the staging DB via
  # `supabase gen types` and fails if the checked-in file has drifted.
  #
  # Gated on STAGING_SUPABASE_DB_URL; when unset, the script exits 0
  # with a warning (same pattern as db-audit above).
  db-types:
    name: DB type drift (E-5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check DB types drift
        env:
          STAGING_SUPABASE_DB_URL: ${{ secrets.STAGING_SUPABASE_DB_URL }}
        run: bash scripts/check-db-types.sh

  # ── Terraform IaC validation (F-01) ───────────────────────────────
  # Catches syntax/type errors in terraform/cloudflare/*.tf so the
  # checked-in policy-as-code is guaranteed to be applyable. We run
  # `terraform init -backend=false` (no remote state needed for
  # syntactic validation) followed by `fmt -check` and `validate`.
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: terraform fmt -check
        run: terraform -chdir=terraform/cloudflare fmt -check -recursive
      - name: terraform init (no backend)
        run: terraform -chdir=terraform/cloudflare init -backend=false
      - name: terraform validate
        run: terraform -chdir=terraform/cloudflare validate

  # ── Cross-workflow required gates ──────────────────────────────────
  # Branch protection should require ALL of the following check names:
  #
  #   1. "Required checks"    (this workflow — lint/test/typecheck/build)
  #   2. "Preview E2E gate"   (preview.yml  — deploy + Playwright E2E)
  #   3. "npm audit (high / critical)"  (security.yml)
  #   4. "License compliance"           (security.yml)
  #   5. "Dependency review"            (security.yml, PRs only)
  #
  # GitHub Actions `needs` cannot cross workflow boundaries, so each
  # workflow exposes its own gate job with a stable name.  Configure
  # all five names as required status checks in repo Settings →
  # Branches → Branch protection rules → Require status checks.

  required-checks:
    name: Required checks
    needs: [check]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        env:
          CHECK_RESULT: ${{ needs.check.result }}
        run: |
          set -euo pipefail
          echo "check: $CHECK_RESULT"
          if [ "$CHECK_RESULT" != "success" ]; then
            echo "::error::Required 'check' job did not succeed"
            exit 1
          fi
