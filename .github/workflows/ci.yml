name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
  SUPABASE_SERVICE_ROLE_KEY: placeholder
  JWT_SECRET: ci-test-secret
  INTERNAL_API_TOKEN: ci-test-internal-token
  CRON_SECRET: ci-test-cron-secret
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ""
  TURNSTILE_SECRET_KEY: ""

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Security audit
        run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      # E2E tests run in two places:
      #   - .github/workflows/e2e.yml       : Playwright against a local
      #                                       Supabase + built app on PRs/main.
      #   - .github/workflows/preview.yml   : Playwright against the staging
      #                                       Cloudflare Worker preview deploy.
      # Both are listed in `required-checks` below so branch protection
      # can require a single check name.

  required-checks:
    name: Required checks
    needs: [check]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        env:
          CHECK_RESULT: ${{ needs.check.result }}
        run: |
          set -euo pipefail
          echo "check: $CHECK_RESULT"
          if [ "$CHECK_RESULT" != "success" ]; then
            echo "::error::Required 'check' job did not succeed"
            exit 1
          fi
