name: CI

on:
  pull_request:
    branches: [main, staging]

# Least-privilege permissions (only what each job needs)
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    name: Lint, Type Check & Tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for vulnerable dependencies
        run: npm audit --omit=dev

      - name: Check cron mapping
        run: npx tsx scripts/check-cron-mapping.ts

      - name: Run ESLint
        run: npm run lint

      - name: Check for DB dumps in tree (Audit P1 #14)
        run: |
          if git ls-files | grep -E 'full_backup\.sql|\.dump$|pg_dump'; then
            echo "::error::DB dump file detected in tree"
            exit 1
          fi

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test

      # CI-08: Coverage thresholds are defined in vitest.config.ts.
      # The coverage step requires @vitest/coverage-v8 which is a devDependency.
      # When the dependency is installed, uncomment this step:
      # - name: Run coverage check
      #   run: npm run test:coverage

      # CI-02: Fail-closed bundle budget check.
      #
      # Next 16 (Turbopack) no longer prints the "First Load JS shared by all"
      # summary in `next build` output, so the previous grep-based check is
      # unreliable. Parse `.next/build-manifest.json` instead — the root main
      # chunks + polyfills are the JS loaded by every page. Budget is
      # expressed in raw (uncompressed) bytes; roughly 4x the gzipped size.
      - name: Bundle size budget check
        run: |
          npm run build 2>&1 | tee build-output.txt
          node scripts/check-bundle-budget.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          # Raw (uncompressed) limit on shared root chunks + polyfills.
          # Current baseline ≈ 560 kB; 1024 kB leaves headroom and fails
          # closed on runaway shared bundle growth (~ 250 kB gzipped).
          BUNDLE_BUDGET_KB: "1024"

      # CI-01: Check for pending DB migrations. Fails if migration files
      # have been added but the migration-check workflow hasn't verified them.
      - name: Migration file check
        run: |
          MIGRATION_FILES=$(git diff --name-only origin/main -- 'supabase/migrations/' 2>/dev/null || echo "")
          if [ -n "$MIGRATION_FILES" ]; then
            echo "New migration files detected:"
            echo "$MIGRATION_FILES"
            echo "Ensure these migrations have been reviewed and tested."
          fi

  security:
    name: Security Scans (Audit P2 #26)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Gitleaks scans the base..head range on PRs, so it needs full
          # history. With the default shallow clone (fetch-depth: 1) the
          # base SHA is unknown and `git log base^..head` fails.
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript, typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript,typescript"

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --ignore-npm-errors \
            --output-format JSON \
            --output-file bom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: bom.json

      - name: Run Semgrep
        continue-on-error: true
        run: |
          python3 -m pip install --upgrade semgrep
          semgrep --config p/javascript --sarif --output semgrep.sarif . || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: "semgrep"
  e2e:
    runs-on: ubuntu-latest
    needs: ci
    name: E2E Tests (Playwright)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Supabase (ephemeral CI project)
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Boot local Supabase
        # `supabase start` boots the local stack and applies every file in
        # supabase/migrations/ in order, so no separate `db push` step is
        # needed (and `db push` would fail anyway because it targets a
        # *linked remote* project, not the local stack).
        #
        # This must run BEFORE `npm run build` so the local Supabase URL
        # (e.g. http://127.0.0.1:54321) is exported into GITHUB_ENV and
        # baked into the client bundle by Next.js. NEXT_PUBLIC_* env vars
        # are inlined at build time, so building with the placeholder URL
        # would permanently pin client-side Supabase calls to a host that
        # doesn't exist.
        run: |
          supabase init --force
          supabase start
          echo "SUPABASE_LOCAL_URL=$(supabase status --output json | jq -r '.API_URL')" >> "$GITHUB_ENV"
          echo "SUPABASE_LOCAL_ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')" >> "$GITHUB_ENV"
          echo "SUPABASE_LOCAL_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_ENV"

      - name: Build application
        # Build runs after `supabase start` so the local Supabase URL/anon
        # key are inlined into the client bundle. Falls back to placeholder
        # values only if the local stack failed to publish them.
        #
        # CI-03 fixture fix: NEXT_PUBLIC_PHONE_AUTH_ENABLED must be set
        # at build time (NEXT_PUBLIC_* vars are inlined by Next.js),
        # otherwise the login/register pages render without the OTP step
        # and the E2E suite fails.
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_LOCAL_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_LOCAL_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_PHONE_AUTH_ENABLED: "true"

      - name: Run E2E tests (blocking)
        # CI-03: Previously ran with `continue-on-error: true` (advisory)
        # because the suite assumed CI scaffolding that was missing —
        # a seeded clinic, a subdomain routed to that clinic, and the
        # NEXT_PUBLIC_PHONE_AUTH_ENABLED flag. Those fixtures are now
        # provided:
        #   1. supabase start applies migration 00053, which seeds the
        #      demo clinic with subdomain='demo'.
        #   2. E2E_BASE_URL targets demo.localhost, so middleware can
        #      resolve tenant context (Chromium resolves *.localhost to
        #      127.0.0.1 per RFC 6761).
        #   3. NEXT_PUBLIC_PHONE_AUTH_ENABLED is set at build time above.
        # The suite is now REQUIRED and failures block the PR.
        run: npx playwright test --project=chromium
        env:
          CI: true
          E2E_BASE_URL: http://demo.localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_LOCAL_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_LOCAL_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_PHONE_AUTH_ENABLED: "true"
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_LOCAL_SERVICE_ROLE_KEY || '' }}
          BOOKING_TOKEN_SECRET: ci-e2e-booking-token-secret-placeholder
          ROOT_DOMAIN: localhost
          NEXT_PUBLIC_SITE_URL: http://demo.localhost:3000
          CRON_SECRET: ci-e2e-cron-secret-placeholder
          # R-02: PROFILE_HEADER_HMAC_KEY is required in production mode (and
          # `next start` runs in production). Without it, env validation in
          # src/lib/env.ts hard-fails on startup and Playwright never gets a
          # running web server, so every test fails with a connect error.
          PROFILE_HEADER_HMAC_KEY: ci-e2e-profile-header-hmac-key-placeholder
          # Force the in-memory rate limiter in CI. The Supabase rate-limit RPC
          # (rate_limit_check_and_increment) isn't reliably available on the
          # ephemeral supabase-cli instance during boot, so the limiter's
          # circuit breaker trips closed and rejects every subsequent request
          # with 429, causing the E2E suite to fail across the board. The
          # in-memory limiter has no external dependency and is appropriate
          # for a single-instance CI web server.
          RATE_LIMIT_BACKEND: memory
          SEED_PASSWORDS_ROTATED: "true"
          SEED_USERS_DELETED: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
