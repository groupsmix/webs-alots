name: Update Cloudflare Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to update (production or staging)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# Least-privilege permissions
permissions:
  contents: read

jobs:
  update-secrets:
    runs-on: ubuntu-latest
    name: Sync Secrets to Cloudflare
    # Audit P2 #21: Add Environment protection
    environment: production
    concurrency: production-secrets
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Set Worker Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ENV_FLAG: ${{ inputs.environment == 'staging' && '--env staging' || '' }}
        run: |
          echo "Updating secrets for ${{ inputs.environment }}..."
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY $ENV_FLAG
          echo "${{ secrets.RESEND_API_KEY }}" | npx wrangler secret put RESEND_API_KEY $ENV_FLAG
          echo "${{ secrets.BOOKING_TOKEN_SECRET }}" | npx wrangler secret put BOOKING_TOKEN_SECRET $ENV_FLAG
          echo "${{ secrets.CRON_SECRET }}" | npx wrangler secret put CRON_SECRET $ENV_FLAG
          echo "Secrets updated successfully."
