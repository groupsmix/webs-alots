# =============================================================================
# Secret Scan — Gitleaks on direct pushes to main / staging
# =============================================================================
#
# The main ci.yml already runs Gitleaks on pull_requests in its `security` job.
# That job only runs when a PR is opened; direct pushes to main or staging
# (e.g., by maintainers with bypass permissions) skip it entirely.
#
# This workflow closes that gap by scanning every push to the protected
# branches with a full git history clone so base..head range diffs work.
#
# No additional secrets are required — GITHUB_TOKEN is provided automatically.
# =============================================================================

name: Secret Scan

on:
  push:
    branches: [main, staging]

# Cancel a redundant scan if two pushes arrive in quick succession.
concurrency:
  group: secrets-scan-${{ github.ref_name }}
  cancel-in-progress: true

# CICD-04 / AUDIT-16: least-privilege workflow-level token.
# Every job starts from a read-only GITHUB_TOKEN. Jobs that need to write
# (e.g. SARIF upload to the Security tab) must opt in explicitly via the
# `permissions:` block on the job itself. This narrows the blast radius
# if any third-party Action is ever compromised.
permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    name: Gitleaks Secret Scan
    # The SARIF upload performed by gitleaks-action requires
    # `security-events: write`. Scoping it at the job level (rather than
    # the workflow level) means any future job added to this workflow
    # starts back at the read-only default and must re-opt-in.
    permissions:
      contents: read
      security-events: write
    steps:
      # CICD-03 / AUDIT-16: Full history needed so Gitleaks can diff base..head.
      - name: Checkout (full history)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
