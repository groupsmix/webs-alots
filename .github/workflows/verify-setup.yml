# ═══════════════════════════════════════════════════════════════════════════════
# VERIFY SETUP - Check if everything is configured correctly
#
# Run this workflow to verify all secrets are set and services are accessible
# before your first deployment.
#
# Usage: GitHub Actions → "Verify Setup" → Run workflow
# ═══════════════════════════════════════════════════════════════════════════════

name: ✅ Verify Setup

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Required Secrets
        run: |
          echo "🔍 Checking required secrets..."
          
          errors=0
          
          # Check Cloudflare secrets
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -z "${{ secrets.CLOUDFLARE_API_KEY }}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN or CLOUDFLARE_API_KEY + CLOUDFLARE_EMAIL required"
            errors=$((errors + 1))
          else
            echo "✅ Cloudflare credentials found"
          fi
          
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID required"
            errors=$((errors + 1))
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID found"
          fi
          
          # Check Supabase secrets
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" ]; then
            echo "❌ NEXT_PUBLIC_SUPABASE_URL required"
            errors=$((errors + 1))
          else
            echo "✅ NEXT_PUBLIC_SUPABASE_URL found"
          fi
          
          if [ -z "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" ]; then
            echo "❌ NEXT_PUBLIC_SUPABASE_ANON_KEY required"
            errors=$((errors + 1))
          else
            echo "✅ NEXT_PUBLIC_SUPABASE_ANON_KEY found"
          fi
          
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "❌ SUPABASE_SERVICE_ROLE_KEY required"
            errors=$((errors + 1))
          else
            echo "✅ SUPABASE_SERVICE_ROLE_KEY found"
          fi
          
          # Check JWT and CRON secrets
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "❌ JWT_SECRET required (generate: openssl rand -hex 64)"
            errors=$((errors + 1))
          else
            echo "✅ JWT_SECRET found"
          fi
          
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "⚠️ CRON_SECRET not set (optional but recommended)"
          else
            echo "✅ CRON_SECRET found"
          fi
          
          if [ $errors -gt 0 ]; then
            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "❌ FOUND $errors MISSING SECRET(S)"
            echo "═══════════════════════════════════════════════════════════════"
            echo ""
            echo "Go to: GitHub repo → Settings → Secrets and variables → Actions"
            echo "Add the missing secrets listed above."
            echo ""
            exit 1
          else
            echo ""
            echo "═══════════════════════════════════════════════════════════════"
            echo "✅ ALL REQUIRED SECRETS ARE SET!"
            echo "═══════════════════════════════════════════════════════════════"
            echo ""
            echo "You're ready to deploy! 🚀"
            echo "Next step: Run the 'Deploy to Cloudflare' workflow"
            echo ""
          fi

      - name: Verify Supabase Connection
        run: |
          echo "🔍 Testing Supabase connection..."
          
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/sites?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}")
          
          if [ "$response" == "200" ] || [ "$response" == "401" ]; then
            echo "✅ Supabase is accessible"
          else
            echo "⚠️ Supabase returned HTTP $response"
            echo "   Check your SUPABASE_SERVICE_ROLE_KEY"
          fi

      - name: Verify Cloudflare Connection
        run: |
          echo "🔍 Testing Cloudflare API..."
          
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}")
          
          if [ "$response" == "200" ]; then
            echo "✅ Cloudflare API is accessible"
          else
            echo "⚠️ Cloudflare API returned HTTP $response"
            echo "   Check your CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID"
          fi

      - name: Summary
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "📋 SETUP VERIFICATION COMPLETE"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "If all checks passed ✅, you can now:"
          echo ""
          echo "  1. Run 'Deploy to Cloudflare' workflow"
          echo "  2. Run 'Setup Domains' workflow"
          echo "  3. Your site will be live!"
          echo ""
          echo "If any checks failed ❌, fix the issues and run this again."
          echo ""
