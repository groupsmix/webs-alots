# ═══════════════════════════════════════════════════════════════════════════════
# ONE-CLICK DOMAIN SETUP
# 
# This workflow automatically:
# 1. Adds custom domains to your Cloudflare Worker
# 2. Updates your Supabase database with the correct domains
# 3. Verifies everything is working
#
# USAGE:
# 1. Go to GitHub → Actions → "Setup Domains" → Run workflow
# 2. Click "Run workflow" 
# 3. Everything happens automatically!
#
# REQUIRED SECRETS:
# - CLOUDFLARE_API_TOKEN (with Workers Scripts:Edit, Zone:Read, DNS:Edit)
# - CLOUDFLARE_ACCOUNT_ID
# - SUPABASE_SERVICE_ROLE_KEY
# - NEXT_PUBLIC_SUPABASE_URL
# ═══════════════════════════════════════════════════════════════════════════════

name: 🚀 Setup Domains (One-Click)

on:
  workflow_dispatch:
    inputs:
      domains:
        description: 'Comma-separated list of domains to setup (optional - uses defaults if empty)'
        required: false
        default: ''
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ═══════════════════════════════════════════════════════════════════════
      # STEP 1: Add Custom Domains to Cloudflare Worker
      # ═══════════════════════════════════════════════════════════════════════
      - name: Add Custom Domains to Worker
        id: setup-domains
        run: |
          #!/bin/bash
          set -e

          WORKER_NAME="affilite-mix"
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          API_TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"

          # Default domains to setup
          if [ -z "${{ github.event.inputs.domains }}" ]; then
            DOMAINS=(
              "wristnerd.xyz"
              "*.wristnerd.xyz"
            )
          else
            IFS=',' read -ra DOMAINS <<< "${{ github.event.inputs.domains }}"
          fi

          echo "🔧 Setting up domains for worker: $WORKER_NAME"
          echo "📋 Domains to configure: ${DOMAINS[*]}"

          for domain in "${DOMAINS[@]}"; do
            # Trim whitespace
            domain=$(echo "$domain" | xargs)
            
            echo "➕ Adding domain: $domain"
            
            # Check if domain already exists
            existing=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/$WORKER_NAME/subdomains" \
              -H "Authorization: Bearer $API_TOKEN" \
              -H "Content-Type: application/json" | jq -r ".result[] | select(.hostname == \"$domain\") | .hostname" || true)
            
            if [ "$existing" == "$domain" ]; then
              echo "  ✅ Domain already exists: $domain"
            else
              # Add custom domain
              response=$(curl -s -X POST \
                "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/$WORKER_NAME/subdomains" \
                -H "Authorization: Bearer $API_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"hostname\":\"$domain\",\"service\":\"$WORKER_NAME\",\"environment\":\"production\"}")
              
              if echo "$response" | jq -e ".success" > /dev/null 2>&1; then
                echo "  ✅ Successfully added: $domain"
              else
                echo "  ⚠️ Failed to add $domain: $(echo "$response" | jq -r ".errors[0].message")"
              fi
            fi
          done

          echo "::set-output name=domains::${DOMAINS[*]}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ═══════════════════════════════════════════════════════════════════════
      # STEP 2: Update Supabase Database Domains
      # ═══════════════════════════════════════════════════════════════════════
      - name: Update Database Domains
        run: |
          #!/bin/bash
          set -e

          SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          SERVICE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

          echo "🔄 Updating Supabase database domains..."

          # SQL to update domains
          SQL=$(cat <<'EOF'
          -- Update wristnerd domain
          UPDATE sites SET domain = 'wristnerd.xyz' WHERE slug = 'watch-tools';
          
          -- Update arabic-tools domain  
          UPDATE sites SET domain = 'arabictools.wristnerd.xyz' WHERE slug = 'arabic-tools';
          
          -- Verify updates
          SELECT slug, name, domain, is_active 
          FROM sites 
          WHERE slug IN ('watch-tools', 'arabic-tools', 'crypto-tools');
          EOF
          )

          # Execute SQL via Supabase REST API
          response=$(curl -s -X POST \
            "$SUPABASE_URL/rest/v1/rpc/exec_sql" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"sql\": $(echo "$SQL" | jq -R -s .)}" 2>/dev/null || echo '{"error":"API call failed"}')

          if echo "$response" | grep -q "error"; then
            echo "⚠️ Could not use RPC, trying direct table update..."
            
            # Fallback: Update via REST API
            curl -s -X PATCH \
              "$SUPABASE_URL/rest/v1/sites?slug=eq.watch-tools" \
              -H "apikey: $SERVICE_KEY" \
              -H "Authorization: Bearer $SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates" \
              -d '{"domain":"wristnerd.xyz"}' > /dev/null
            
            curl -s -X PATCH \
              "$SUPABASE_URL/rest/v1/sites?slug=eq.arabic-tools" \
              -H "apikey: $SERVICE_KEY" \
              -H "Authorization: Bearer $SERVICE_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates" \
              -d '{"domain":"arabictools.wristnerd.xyz"}' > /dev/null
            
            echo "✅ Database updated via REST API"
          else
            echo "✅ Database updated via SQL"
          fi

          # Show current state
          echo "📊 Current site domains:"
          curl -s -X GET \
            "$SUPABASE_URL/rest/v1/sites?select=slug,name,domain,is_active" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" | jq '.'

      # ═══════════════════════════════════════════════════════════════════════
      # STEP 3: Verify Domains Are Working
      # ═══════════════════════════════════════════════════════════════════════
      - name: Verify Domains
        run: |
          echo "🔍 Verifying domains..."
          
          # Wait a moment for DNS propagation
          sleep 5
          
          # Test wristnerd.xyz
          echo -n "Testing wristnerd.xyz... "
          if curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://wristnerd.xyz/api/health | grep -q "200\|401\|403"; then
            echo "✅ OK"
          else
            echo "⏳ May need more time to propagate"
          fi
          
          # Test arabictools subdomain
          echo -n "Testing arabictools.wristnerd.xyz... "
          if curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://arabictools.wristnerd.xyz/api/health | grep -q "200\|401\|403"; then
            echo "✅ OK"
          else
            echo "⏳ May need more time to propagate"
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # STEP 4: Summary
      # ═══════════════════════════════════════════════════════════════════════
      - name: Setup Summary
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "✅ DOMAIN SETUP COMPLETE!"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "🌐 Your sites are now available at:"
          echo "   • https://wristnerd.xyz"
          echo "   • https://arabictools.wristnerd.xyz"
          echo ""
          echo "📋 Next steps:"
          echo "   1. Update DNS records in Cloudflare if not already done:"
          echo "      - wristnerd.xyz → A record → 192.0.2.1 (Proxied)"
          echo "      - arabictools → CNAME → wristnerd.xyz (Proxied)"
          echo ""
          echo "   2. Add more domains anytime:"
          echo "      - Go to GitHub Actions → 'Setup Domains' → Run workflow"
          echo "      - Or add domains in Cloudflare Dashboard directly"
          echo ""
          echo "   3. Check admin panel:"
          echo "      - https://wristnerd.xyz/admin"
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
