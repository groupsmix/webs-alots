name: Rotate PHI Encryption Key

on:
  workflow_dispatch:
    inputs:
      new_key:
        description: 'New 64-character hex encryption key'
        required: true
        type: string

# Least-privilege permissions
permissions:
  contents: read

jobs:
  rotate-key:
    runs-on: ubuntu-latest
    name: Rotate PHI Key in R2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run rotation script
        env:
          PHI_ENCRYPTION_KEY: ${{ secrets.PHI_ENCRYPTION_KEY }}
          NEW_PHI_ENCRYPTION_KEY: ${{ inputs.new_key }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          npx tsx scripts/rotate-phi-key.ts
