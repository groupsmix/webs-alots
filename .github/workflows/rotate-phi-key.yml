name: Rotate PHI Encryption Key

on:
  # A35.5: Automated rotation reminder on a 90-day cadence. The scheduled
  # run will fail (new_key input is empty) but the failure notification
  # serves as a reminder to rotate the key manually. For fully automated
  # rotation, supply a generated key via the workflow_dispatch API.
  schedule:
    - cron: '0 9 1 */3 *' # 09:00 UTC on the 1st of every 3rd month
  workflow_dispatch:
    inputs:
      new_key:
        description: 'New 64-character hex encryption key'
        required: true
        type: string

# Least-privilege permissions
permissions:
  contents: read

jobs:
  rotate-key:
    runs-on: ubuntu-latest
    name: Rotate PHI Key in R2
    steps:
      # AUDIT-16: Pin GH Actions to SHA for supply-chain hardening
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # A35.5: Guard against scheduled runs where no key is provided
      - name: Check rotation key provided
        run: |
          if [ -z "${{ inputs.new_key }}" ]; then
            echo "::error::PHI encryption key rotation is due (90-day cadence). Run this workflow manually via workflow_dispatch with a new 64-char hex key. See docs/SOP-PHI-KEY-ROTATION.md."
            exit 1
          fi

      - name: Run rotation script
        env:
          PHI_ENCRYPTION_KEY: ${{ secrets.PHI_ENCRYPTION_KEY }}
          NEW_PHI_ENCRYPTION_KEY: ${{ inputs.new_key }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          npx tsx scripts/rotate-phi-key.ts
