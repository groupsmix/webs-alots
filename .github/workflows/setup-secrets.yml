# ═══════════════════════════════════════════════════════════════════════════════
# 🔑 SETUP GITHUB SECRETS
#
# This workflow sets up all required secrets in GitHub Actions.
# Run this ONCE to configure your credentials.
#
# USAGE:
# 1. Go to GitHub → Actions → "🔑 Setup Secrets" → Run workflow
# 2. Enter your credentials in the form
# 3. Wait 30 seconds
# 4. All secrets are set automatically!
# ═══════════════════════════════════════════════════════════════════════════════

name: 🔑 Setup Secrets

on:
  workflow_dispatch:
    inputs:
      cloudflare_api_token:
        description: "Cloudflare API Token"
        required: true
        type: string
      cloudflare_account_id:
        description: "Cloudflare Account ID"
        required: true
        type: string
      supabase_access_token:
        description: "Supabase Personal Access Token"
        required: true
        type: string
      supabase_project_ref:
        description: "Supabase Project Ref"
        required: false
        type: string
        default: ""
      admin_email:
        description: "Admin email"
        required: false
        type: string
        default: "admin@example.com"
      admin_password:
        description: "Admin password"
        required: false
        type: string
        default: ""

jobs:
  setup-secrets:
    name: 🔑 Setting Up Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tweetnacl
        run: npm install tweetnacl tweetnacl-util

      - name: Set GitHub Secrets
        id: set-secrets
        run: |
          node << 'ENDSCRIPT'
          const https = require('https');

          const GITHUB_TOKEN = process.env.GITHUB_TOKEN;
          const REPO = 'groupsmix/affilite-mix';

          const inputs = {
            'CLOUDFLARE_API_TOKEN': '${{ github.event.inputs.cloudflare_api_token }}',
            'CLOUDFLARE_ACCOUNT_ID': '${{ github.event.inputs.cloudflare_account_id }}',
            'SUPABASE_ACCESS_TOKEN': '${{ github.event.inputs.supabase_access_token }}',
            'SUPABASE_PROJECT_REF': '${{ github.event.inputs.supabase_project_ref }}',
            'ADMIN_BOOTSTRAP_EMAIL': '${{ github.event.inputs.admin_email }}',
            'ADMIN_BOOTSTRAP_PASSWORD': '${{ github.event.inputs.admin_password }}',
          };

          const SECRETS = {};
          for (const [k, v] of Object.entries(inputs)) {
            if (v && v.trim() && v !== '""' && v !== "''") {
              SECRETS[k] = v;
            }
          }

          async function githubApi(method, path, data = null) {
            return new Promise((resolve, reject) => {
              const body = data ? JSON.stringify(data) : '';
              const options = {
                hostname: 'api.github.com',
                path: path,
                method: method,
                headers: {
                  'Authorization': `Bearer ${GITHUB_TOKEN}`,
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json',
                }
              };
              if (body) options.headers['Content-Length'] = Buffer.byteLength(body);
              const req = https.request(options, (res) => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => { try { resolve(JSON.parse(d)); } catch { resolve(d); } });
              });
              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function getPublicKey() {
            const r = await githubApi('GET', `/repos/${REPO}/actions/secrets/public-key`);
            return { keyId: r.key_id, key: r.key };
          }

          function toBytes(b64) {
            const s = atob(b64);
            const b = new Uint8Array(s.length);
            for (let i = 0; i < s.length; i++) b[i] = s.charCodeAt(i);
            return b;
          }

          function toBase64(b) {
            let s = '';
            for (const byte of b) s += String.fromCharCode(byte);
            return btoa(s);
          }

          async function encrypt(publicKeyBase64, secretValue) {
            const nacl = require('tweetnacl');
            const publicKey = toBytes(publicKeyBase64);
            const message = new TextEncoder().encode(secretValue);
            const encrypted = nacl.sealed.box(message, null, publicKey);
            return toBase64(encrypted);
          }

          async function setSecret(name, value) {
            if (!value || !value.trim()) return;
            console.log(`Setting ${name}...`);
            try {
              const { keyId, key } = await getPublicKey();
              const encrypted = await encrypt(key, value);
              const result = await githubApi('PUT', `/repos/${REPO}/actions/secrets/${name}`, {
                encrypted_value: encrypted,
                key_id: keyId
              });
              if (!result.message) console.log(`  ✅ ${name}`);
              else console.log(`  ⚠️ ${name}: ${result.message}`);
            } catch (e) {
              console.log(`  ❌ ${name}: ${e.message}`);
            }
          }

          async function main() {
            console.log('Setting secrets...\n');
            for (const [n, v] of Object.entries(SECRETS)) await setSecret(n, v);
            console.log('\n✅ Done!');
          }

          main().catch(console.error);
          ENDSCRIPT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: |
          echo "✅ SECRETS SETUP COMPLETE!"
          echo ""
          echo "Next: Go to Actions → '🚀 One-Click Full Setup' → Run workflow"
