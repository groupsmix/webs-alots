name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      site_slug:
        description: "Site slug to test (watch-tools, crypto-tools, arabic-tools, ai-compared)"
        required: false
        default: "watch-tools"
  # Disable on push for now - run manually to avoid blocking deploys
  # push:
  #   branches: [main]
  # pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  SITE_SLUG: ${{ github.event.inputs.site_slug || 'watch-tools' }}

jobs:
  e2e:
    name: Playwright E2E (${{ env.SITE_SLUG }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Start Supabase (local)
        run: |
          npm install -g supabase
          supabase start
          echo "SUPABASE_URL=$(supabase status | grep 'API URL' | awk '{print $4}')" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(supabase status | grep 'anon key' | awk '{print $4}')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status | grep 'service_role key' | awk '{print $5}')" >> $GITHUB_ENV

      - name: Apply database migrations
        run: |
          for file in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying migration: $file"
            supabase db execute --file "$file" || true
          done

      - name: Seed test data
        run: |
          supabase db seed --file supabase/seed.sql || true

      - name: Generate types
        run: npx supabase gen types typescript --project-id test > types/database.ts 2>/dev/null || true

      - name: Setup environment
        run: |
          cat > .env << EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET=ci-test-secret-jwt-at-least-32-chars-long
          NEXT_PUBLIC_DEFAULT_SITE=${{ env.SITE_SLUG }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY=""
          TURNSTILE_SECRET_KEY=""
          CRON_SECRET=ci-cron-secret
          EOF

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ci-test-secret-jwt-at-least-32-chars-long
          NEXT_PUBLIC_DEFAULT_SITE: ${{ env.SITE_SLUG }}

      - name: Start application
        run: |
          echo "Starting Next.js server..."
          npm start > server.log 2>&1 &
          echo $! > server.pid
          sleep 2
          echo "Server PID: $(cat server.pid)"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ci-test-secret-jwt-at-least-32-chars-long
          NEXT_PUBLIC_DEFAULT_SITE: ${{ env.SITE_SLUG }}
          PORT: 3000
          HOSTNAME: 0.0.0.0

      - name: Wait for application to be ready
        run: |
          echo "Waiting for server..."
          wait-on http://localhost:3000 --timeout 60000 || (echo "Server failed to start"; cat server.log; exit 1)
          echo "Server is ready!"

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_DEFAULT_SITE: ${{ env.SITE_SLUG }}

      - name: Stop Supabase
        if: always()
        run: supabase stop || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ env.SITE_SLUG }}
          path: playwright-report/
          retention-days: 7
