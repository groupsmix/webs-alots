# ═══════════════════════════════════════════════════════════════════════════════
# 🚀 ONE-CLICK FULL SETUP
#
# Does EVERYTHING automatically:
# 1. Fetches Supabase credentials via API
# 2. Sets up Cloudflare R2 and KV
# 3. Deploys to Cloudflare Workers
# 4. Creates admin user
#
# USAGE:
# 1. First run "🔑 Setup Secrets" workflow
# 2. Then run this workflow
# 3. Wait 5-10 minutes
# 4. Done! 🎉
# ═══════════════════════════════════════════════════════════════════════════════

name: 🚀 One-Click Full Setup

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: "Admin email"
        required: false
        type: string
        default: "admin@example.com"
      admin_password:
        description: "Admin password"
        required: false
        type: string
        default: ""

concurrency:
  group: one-click
  cancel-in-progress: true

jobs:
  full-setup:
    name: 🚀 Full Setup
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz -o supabase.tar.gz
          tar -xzf supabase.tar.gz
          mv supabase /usr/local/bin/supabase
          chmod +x /usr/local/bin/supabase
          rm supabase.tar.gz

      - name: Install psql
        run: apt-get update && apt-get install -y postgresql-client jq 2>&1 | tail -3

      # ═══════════════════════════════════════════════════════════════════════
      # SUPABASE SETUP
      # ═══════════════════════════════════════════════════════════════════════
      - name: Fetch Supabase Credentials
        id: supabase
        run: |
          echo "🔧 Fetching Supabase credentials..."
          TOKEN="${{ secrets.SUPABASE_ACCESS_TOKEN }}"
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"

          if [ -z "$PROJECT_REF" ]; then
            PROJECT_REF=$(curl -s -X GET "https://api.supabase.com/v1/projects" \
              -H "Authorization: Bearer $TOKEN" | jq -r '.[0].ref')
          fi

          SUPABASE_URL="https://$PROJECT_REF.supabase.co"
          echo "SUPABASE_URL=$SUPABASE_URL" >> $GITHUB_ENV
          echo "PROJECT_REF=$PROJECT_REF" >> $GITHUB_ENV
          echo "✅ Supabase URL: $SUPABASE_URL"

      - name: Push Database Schema
        run: |
          echo "📊 Applying database schema..."
          DB_URL="${{ secrets.SUPABASE_DB_URL }}"

          if [ -n "$DB_URL" ]; then
            psql "$DB_URL" -f supabase/schema.sql 2>&1 || echo "Schema may exist"
            psql "$DB_URL" -f supabase/admin-users.sql 2>&1 || echo "Admin schema may exist"
            echo "✅ Schema applied"
          else
            echo "⚠️ SUPABASE_DB_URL not set - skipping schema"
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # CLOUDFLARE SETUP
      # ═══════════════════════════════════════════════════════════════════════
      - name: Setup R2 Bucket
        run: |
          echo "☁️ Setting up R2 bucket..."
          npx wrangler r2 bucket create next-inc-cache 2>&1 || echo "Bucket exists"
          echo "✅ R2 ready"

      - name: Setup KV Namespace
        run: |
          echo "🔑 Setting up KV namespace..."
          KV_OUTPUT=$(npx wrangler kv:namespace create RATE_LIMIT_KV 2>&1)
          KV_ID=$(echo "$KV_OUTPUT" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "")

          if [ -n "$KV_ID" ]; then
            sed -i "s/\"id\": \"[^\"]*\"/\"id\": \"$KV_ID\"/" wrangler.jsonc
            echo "✅ KV created: $KV_ID"
          else
            echo "⚠️ KV may exist"
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # BUILD & DEPLOY
      # ═══════════════════════════════════════════════════════════════════════
      - name: Build
        run: |
          echo "🔨 Building..."
          npx @opennextjs/cloudflare build

      - name: Deploy
        run: |
          echo "🚀 Deploying..."
          npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ═══════════════════════════════════════════════════════════════════════
      # SET SECRETS
      # ═══════════════════════════════════════════════════════════════════════
      - name: Set Worker Secrets
        run: |
          echo "🔐 Setting secrets..."
          WORKER="affilite-mix"

          JWT_SECRET=$(openssl rand -hex 64)
          CRON_SECRET=$(openssl rand -hex 32)

          echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET --name $WORKER
          echo "$CRON_SECRET" | npx wrangler secret put CRON_SECRET --name $WORKER
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --name $WORKER
          echo "${{ env.SUPABASE_URL }}" | npx wrangler secret put NEXT_PUBLIC_SUPABASE_URL --name $WORKER
          echo "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" | npx wrangler secret put NEXT_PUBLIC_SUPABASE_ANON_KEY --name $WORKER

          echo "✅ Secrets set"

      # ═══════════════════════════════════════════════════════════════════════
      # ADMIN USER
      # ═══════════════════════════════════════════════════════════════════════
      - name: Create Admin User
        run: |
          echo "👤 Creating admin user..."
          DB_URL="${{ secrets.SUPABASE_DB_URL }}"
          EMAIL="${{ github.event.inputs.admin_email }}"
          PASSWORD="${{ github.event.inputs.admin_password }}"

          if [ -n "$DB_URL" ] && [ -n "$EMAIL" ] && [ -n "$PASSWORD" ]; then
            psql "$DB_URL" -c "
              INSERT INTO admin_users (email, password_hash, name, role, is_active)
              VALUES ('$EMAIL', crypt('$PASSWORD', gen_salt('bf')), 'Admin', 'super_admin', true)
              ON CONFLICT (email) DO UPDATE SET password_hash = EXCLUDED.password_hash;
            " 2>&1 && echo "✅ Admin created: $EMAIL"
          fi

      # ═══════════════════════════════════════════════════════════════════════
      # DONE
      # ═══════════════════════════════════════════════════════════════════════
      - name: Done
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "✅ ONE-CLICK SETUP COMPLETE!"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "🌐 Sites:"
          echo "   • https://wristnerd.xyz"
          echo "   • https://arabictools.wristnerd.xyz"
          echo "   • https://crypto.wristnerd.xyz"
          echo ""
          echo "🔐 Admin: ${{ github.event.inputs.admin_email }}"
          echo "═══════════════════════════════════════════════════════════════"
