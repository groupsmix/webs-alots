name: AI Safety Evaluation

on:
  schedule:
    - cron: "0 2 * * *" # Run at 2 AM UTC every day
  pull_request:
    paths:
      - "src/app/api/v1/ai/**"
      - "src/lib/ai/**"
      - "evals/**"

# Least-privilege permissions (Scorecard: Token-Permissions)
permissions:
  contents: read

jobs:
  evaluate-ai:
    runs-on: ubuntu-latest

    steps:
      # Pin GH Actions to full SHA per repo convention (Scorecard: Pinned-Dependencies)
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run AI Evaluations
        run: npx tsx evals/runners/evaluate.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_KEY }}

      - name: Upload Evaluation Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: ai-eval-report
          path: evals/reports/*.json
          retention-days: 14
