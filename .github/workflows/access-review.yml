# SEC-012: Quarterly access review evidence collection.
#
# Snapshots current team membership and access configuration from GitHub,
# Supabase, and Cloudflare into a timestamped markdown report. The report
# is uploaded as a workflow artifact for SOC 2 Type II evidence.
#
# Schedule: 1st of Jan, Apr, Jul, Oct at 06:00 UTC.
# Can also be triggered manually via workflow_dispatch.

name: Quarterly Access Review

on:
  schedule:
    - cron: "0 6 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-evidence:
    runs-on: ubuntu-latest
    name: Collect Access Evidence
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate access review report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +"%Y-%m-%d")
          REPORT="access-review-${DATE}.md"

          echo "# Access Review — ${DATE}" > "$REPORT"
          echo "" >> "$REPORT"
          echo "## GitHub Repository Collaborators" >> "$REPORT"
          echo "" >> "$REPORT"
          echo '```' >> "$REPORT"
          gh api repos/${{ github.repository }}/collaborators \
            --jq '.[] | "\(.login) — \(.role_name)"' >> "$REPORT" 2>/dev/null || echo "(requires admin token)" >> "$REPORT"
          echo '```' >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## GitHub Actions Secrets (names only)" >> "$REPORT"
          echo "" >> "$REPORT"
          echo '```' >> "$REPORT"
          gh api repos/${{ github.repository }}/actions/secrets \
            --jq '.secrets[] | .name' >> "$REPORT" 2>/dev/null || echo "(requires admin token)" >> "$REPORT"
          echo '```' >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## GitHub Deploy Keys" >> "$REPORT"
          echo "" >> "$REPORT"
          echo '```' >> "$REPORT"
          gh api repos/${{ github.repository }}/keys \
            --jq '.[] | "\(.title) — read_only=\(.read_only)"' >> "$REPORT" 2>/dev/null || echo "(none or requires admin)" >> "$REPORT"
          echo '```' >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## Supabase Project Members" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "_(Requires manual snapshot from Supabase dashboard > Settings > Team)_" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## Cloudflare Team Members" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "_(Requires manual snapshot from Cloudflare dashboard > Manage Account > Members)_" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## Stripe Team Members" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "_(Requires manual snapshot from Stripe dashboard > Settings > Team)_" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "---" >> "$REPORT"
          echo "Generated by: .github/workflows/access-review.yml" >> "$REPORT"
          echo "Next review due: $(date -u -d '+3 months' +"%Y-%m-%d" 2>/dev/null || date -u -v+3m +"%Y-%m-%d" 2>/dev/null || echo 'TBD')" >> "$REPORT"

          cat "$REPORT"

      - name: Upload report artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: access-review-${{ github.run_id }}
          path: access-review-*.md
          retention-days: 365
