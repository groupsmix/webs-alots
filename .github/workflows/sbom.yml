# ═══════════════════════════════════════════════════════════════════════════════
# SBOM Generation & Artifact Signing
#
# Generates a Software Bill of Materials (SPDX + CycloneDX) on every release
# and PR merge. Artifacts are signed with cosign (keyless / GitHub OIDC) and
# uploaded as workflow artifacts + release assets.
#
# Addresses audit finding: "No SBOM pipeline evidenced."
# ═══════════════════════════════════════════════════════════════════════════════
name: SBOM & Artifact Signing

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write
  id-token: write # Required for cosign keyless signing via GitHub OIDC
  attestations: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm install

      # ── Generate CycloneDX SBOM ──────────────────────────────────────
      - name: Generate CycloneDX SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json --output-format json
        continue-on-error: false

      # ── Generate SPDX SBOM ──────────────────────────────────────────
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-spdx

      # ── Install cosign ──────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # ── Sign SBOMs (keyless — uses GitHub OIDC identity) ────────────
      - name: Sign CycloneDX SBOM
        run: cosign sign-blob --yes --bundle sbom.cdx.json.bundle sbom.cdx.json
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Sign SPDX SBOM
        run: cosign sign-blob --yes --bundle sbom.spdx.json.bundle sbom.spdx.json
        env:
          COSIGN_EXPERIMENTAL: "1"

      # ── Upload artifacts ────────────────────────────────────────────
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          retention-days: 90
          path: |
            sbom.cdx.json
            sbom.cdx.json.bundle
            sbom.spdx.json
            sbom.spdx.json.bundle

      # ── Attach to GitHub Release (if triggered by release) ─────────
      - name: Upload SBOMs to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.cdx.json
            sbom.cdx.json.bundle
            sbom.spdx.json
            sbom.spdx.json.bundle

      # ── GitHub Artifact Attestation (supply-chain provenance) ──────
      - name: Attest CycloneDX SBOM
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: sbom.cdx.json

      - name: Attest SPDX SBOM
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: sbom.spdx.json
