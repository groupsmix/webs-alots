version: 2
# A34.17: Dependabot does not sign commits by default. Branch protection
# should NOT require signed commits until GitHub adds Dependabot signing
# support, or use a merge-bot that re-signs. Track:
# https://github.com/dependabot/dependabot-core/issues/1039
updates:
  # Enable automated npm dependency updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Next.js 16.2 is currently explicitly configured and we may not want automatic bumps yet
      - dependency-name: "next"
      - dependency-name: "react"
      - dependency-name: "react-dom"
    labels:
      - "dependencies"
      - "security"

  # Enable automated GitHub Actions updates
  # A34.16: Dependabot will propose SHA-pinned updates for actions,
  # keeping our supply-chain hardening up to date automatically.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github_actions"
