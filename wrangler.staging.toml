#:schema node_modules/wrangler/config-schema.json
#
# Staging Environment Configuration
# Deployed via: wrangler deploy --env staging
# URL: staging.yourdomain.com
#
# This worker uses a SEPARATE Supabase project for data isolation.
# Set these secrets in GitHub Actions (Settings > Secrets):
#   STAGING_SUPABASE_URL
#   STAGING_SUPABASE_ANON_KEY
#

name = "webs-alots-staging"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Static assets served from Cloudflare Pages
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Custom domain for staging
# Configure in Cloudflare Dashboard:
#   Workers & Pages > webs-alots-staging > Settings > Domains & Routes
# Add route: staging.yourdomain.com/*
